body:
  text: 圓覺經集注序潼川沙門居簡述覺而不圓者有矣夫未有圓而不覺者也圓而不覺者有矣夫未有覺而不圓者也昭昭日用之間而不知也一性圓具不知故不覺也性之所具曰圓圓也者凡愚不虧聖神不盈自本自根與生俱生圓同太虗而無欠無餘太虗同受而與之俱化良由習與性離情與智違背大明處即大暗室悠悠長瞑不了此覺縱復亦了覺而不圓惟其不圓其證亦爾遂有修證之目為三種行證之所以別也所修者何修此者也所證者何證此者也所修不同所證則一也所覺不同所圓則一也故曰一切衆生皆證圓覺非覺之以妙覺則止於其所覺非圓之以至圓則止於其所圓自四十一地以前皆止於其所止而不知其所由止也不修何以達其證不證何以明其修亡證而亡修而妄冀夫所謂圓覺者是今日適越而昔至也修而後能證證而後能忘則十二大士未始有問也十萬大衆未始有聞也六塵不濯而清淨四病不藥而瘳也靜幻寂非一而非三單復圓無前無後也如是乃至圓裹三世清淨平等皆光明藏也圭峯發明此經造疏數萬言反約於廣博浩繁之中略為別本由唐至今廣略並行西南學徒家有其書於戲盛哉江淮荊蠻稍若不競天台再造於五季糾離之際鼓行吳越間作者輩出巉然見頭角由是二家之言肝膽楚越咫尺雲壤彼所宗尚我得排斥我所宣演彼得指議異己之卓識與共𡑡堵必羣而咻之務其説之不售同己之固陋遠在萬里必引而嗾之欲其喙之必信使二家之道不淪於必爭之口者幾希此吾古雲粹師所以憤悱慨慷集注此經而示其同也以本宗之義發他示之言以他宗之奧揭本宗之玄本諸其理不本諸其宗參諸其心不參諸其人黨非其同伐非其異平持其衡婉立其言俾滯於一曲者知夫師子手足一金也江河淮濟一水也毋求異於圭峰亦毋以求同也異其所異而同其所同也後五百世有自圭峰而得古雲或自古雲而得圭峰者天也非一人之私所能也大方廣圓覺修多羅了義經集注上并序苕水沙門元粹述大哉覺性圓裹十方魔佛同遊色心交徹有見皆成妄想無言猶在半途一相不存萬機齊赴故我薄伽梵住聖凡之本際振行證之宏綱文殊問本起之因遍吉咨如幻之行克彰圓照盡掃疑情普眼章三學相資觀雖圓而漸助金剛藏衆生本佛金混礦而須銷彌勒窮流轉愛源淨慧扣證修地位此下方法不定圓攝有三威德聞行體思修辨音啓定輪交互證悟了覺之執相酬淨業以令除作止任滅之病根示普覺而擇友圓覺稟三期而垂軌善首持五目以流通華貫環連金聲玉振將規法利盍闡義門準天台一宗探圭峰諸疏萃乎精要補以前聞庶因言遣言得月忘指者矣時宋嘉定七年歲在甲戌九月九日序圭峰禪師宗密疏鈔鄣南法師神煥疏東陽法師居式疏竹菴法師可觀手鑒慈室法師妙雲直解苕水沙門元粹集諸疏精微竊加私注
