body:
  text: 四清淨慧章判修證高下二初請問三初進問威儀於是清淨慧菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊為我等輩廣說如是不思議事本所不見本所不聞我等今者蒙佛善誘身心泰然得大饒益二請後二初正問位次願為諸來一切法衆重宣法王圓滿覺性一切衆生及諸菩薩如來世尊所證所得云何差別舉所證覺性問能證位地覺心一味因果階差二義既乖故須起問圭峯二願益未來令末世衆生聞此聖教隨順開悟漸次能入三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為末世衆生請問如來漸次差別汝今諦聽當為汝說二受旨時清淨慧菩薩奉教歡喜及諸大衆默然而聽三正答二初長行二初明六即位次有二謂理同故即事異故六若知理同迷悟平等免於退屈若知事異因果不濫免生上慢又此六即收凡聖盡九界三道屬初理即聞圓頓教屬名字即五品觀行即十信相似即十住十行十回向十地等覺四十一位總為分真即妙覺則名究竟即也斯是天台圓教判位宛與經合初理同故即三初法二初正示理同善男子圓覺自性非性性有循諸性起無取無證於實相中實無菩薩及與衆生圓滿覺性三諦具足自性中也非性空也性有假也有是具義以性具十界循界性而緣起法法即性是則菩薩衆生本是實相復何取證於其間哉平等真法界佛不度衆生亦此謂也實相即是覺性異名私注非性者非前五性及貪愛等輪回差別之性性有者前差別性皆有圓覺循隨也圓覺不守自生隨緣遍諸差別之性諸性起時全覺性起故法身不增不減經云法身流轉五道名曰衆生無取無證者非當情之境圭峯二徵釋所以何以故菩薩衆生皆是幻化幻化滅故無取證者以性奪修故菩薩衆生二皆如幻指幻即性名幻化滅如荊溪謂本虗名滅也既皆即性同一圓覺故不復有能取證者慈室二喻譬如眼根不自見眼若不明隨緣不變幻化即性只作遣蕩釋上文者何當此喻眼只是一誰為能見誰為所見慈室三合性自平等無平等者圓覺自性性自平等性不自謂無平等者竹菴平等一性天然如是是外無有能平等者若更云有心外見法今學道人誰不談性只為尚存能平等者所以未能絶念歸一慈室二事異故六二初總明大意二初迷悟差別衆生迷倒未能除滅一切幻化於滅未滅妄功用中便顯差別衆生迷倒五住煩惱也一切幻化九界因果也不達三障即是三德故曰未能除滅滅未滅者達與未達矣耳五即名達理即未達復約五即前後相望論滅未滅私注迷即不覺迷必對悟悟即始覺覺有深淺故名字解心虗通觀行伏而未斷相似粗惑先落分真斷而未圓此四位中以幻修幻皆妄功用至究竟果功用方息對前理即六位宛然故云便顯差別東陽二復性一如若得如來寂滅隨順實無寂滅及寂滅者諸佛同證寂滅之理隨順者與本相應無乖違也後二句亡能所實無寂滅之法亦無能寂滅者滅之令寂圭峯已入無功用地心行處滅言語道斷復性平等猶如虗空竹菴二別示六即六初理即善男子一切衆生從無始來由妄想我及愛我者曾不自知念念生滅故起憎愛耽著五欲全體在迷名為理即縱稟權教覺性未明東陽不約凡迷即無地位故先標此翻之彰信我體元空妄想為有執為我故便生愛著我體所執我見能執圭峯妄想我者錯認四大及愛我者執我之見既執此我保之為常生住異滅殊不自知從此身心遂造諸業憎愛造業心也五欲造業境也慈室二名字即若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮善友知識也教令稟教也開悟知解也知我身心是本覺性起亦圓覺滅亦圓覺解妄為真故云發明此生勞慮雖未能忘到此已知全性而起故曰性自慈室發明起滅慧照朗然顯發心性無始妄習一時悟現以冥真之慧照起滅之念起之與滅念念皆知翻前不知念念生滅即知等者此生滅心迷性之時性即起滅妄念還自勞役心慮圭峯悟圓覺性不離起滅故曰發明即達日用現行煩惱全是如來根本大智此舉果證以教初心故曰教令開悟後二句直解為優私注三觀行即若復有人勞慮永斷得法界淨即彼淨解為自障礙故於圓覺而不自在此名凡夫隨順覺性此位頓伏三惑觀與理冥故云勞慮永斷得法界淨既伏必斷名為永斷然此觀解尚存能所故障圓覺不自在也隨順只是相應之義結名凡夫者天台定為圓教外凡亦名五品位具出法華分別功德品私注四相似即善男子一切菩薩見解為礙雖斷解礙猶住見覺覺礙為礙而不自在此名菩薩未入地者隨順覺性此能見前淨解為礙故斷解礙然能見智名曰見覺先斷二惑見思塵沙得六根淨似後真證如鍮比金住此見覺還名覺礙礙於圓覺不自在也天台十乘有離法愛離此見覺入後分真問前位頓伏三惑此何二惑先斷曰初心用觀事理頓忘三觀一心故能圓伏然智有微著惑有粗細約智明斷不無前後故譬冶鐵粗垢先去私注五分真即四十一地分證三德分破無明始從初住終至金剛分三初證理三初法善男子有照有覺俱名障礙是故菩薩常覺不住照與照者同時寂滅有照有覺指前二位照是淨解覺是見覺二皆有住故俱名礙稱性之照故云常覺照而非照故云不住又照是所照者是能能所俱泯故云照與照者同時寂滅私注亦不可同凡夫故云常覺不同地前故云不住圭峯二喻譬如有人自斷其首首已斷故無能斷者人喻能照首喻所照所照既寂能照亦亡私注三合則以礙心自滅諸礙礙已斷滅無滅礙者實相無念有照即礙若立能照照達妄念還成以礙滅礙如以聲止聲也又能觀觀即無明是所觀即前有照有覺故曰礙心自滅諸礙後二句泯能所私注二忘教修多羅教如標月指若復見月了知所標畢竟非月一切如來種種言說開示菩薩亦復如是夫設言象在於得意無言象而倒惑執言象而迷真故以標月之指喻於言教謂見月須藉指端悟心須假佛教因指見月見月忘指因教詮心悟心忘教存指則失真月執教則失本心意令證實忘標故云畢竟非月一切如來等者正明諸佛同以言詮顯理故文殊般若云總持無文字文字顯總持圭峯三結位此名菩薩已入地者隨順覺性若云入地方破無明是別教義今是圓位借別名耳又四十一位之所同依故總云地私注六究竟即三初示境善男子一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及淫怒癡俱是梵行衆生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫初二句總標也列十對法皆同真實一識智對無念則得其正念是智也有念則為失念是識也念本自空元自無念故皆解脫二成破對衆緣相會曰成緣離曰破又進修曰成毀謗曰破緣無自性成破一如故皆涅槃三愚智對四邪正對五真妄對六染淨對無行經云貪欲即是道恚癡亦復然七依正對八苦樂對九有性無性對有性者三乘性也無性者闡提性也非唯他日回心現己齊成佛道十縛解對佛頂經云根塵同源縛脫無二上之十對名相雖異其意不殊但緣佛證覺心心無取捨故得諸法普同圓妙圭峯一切障礙即究竟覺者總標三障即三德下別約德障離成十對當準圭峰疏解但此經明二乘作佛不異楞伽密對菩薩也鄣南二明照法界海慧照了諸相猶如虗空平等大慧深廣如海此慧離念諸相皆空東陽三結位此名如來隨順覺性結果位也起信論云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細心念故得見心性心即常住名究竟覺圭峯二顯入位法門三初圓修行相二初的示安心善男子但諸菩薩及末世衆生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實文有四節每節二句妄念攀緣取著外法也念則違覺故令不起若求真捨妄猶棄影勞形若滅妄存真似揚聲止響境從心現元是自心若加了知即迷現量能知既寂即真實知真實即知誰知真實如眼不自見等圭峯此舉十二時中至要之術金剛般若云離一切相則名諸佛鄣南行者當知一切時處身心依正俱是法界常空假中如珠走盤無可留影性德妙行無越是矣私注二依法悟入彼諸衆生聞是法門信解受持不生驚畏是則名為隨順覺性彼當機衆若聞此方便心無疑惑體達分明領受任持則坦然合道亦同金剛經中不驚不怖不畏甚為希有等圭峰二宿植德本善男子汝等當知如是衆生已曾供養百千萬億恆河沙諸佛及大菩薩植衆德本驗今開悟頓契佛心方達宿因曩承熏習圭峰三印成佛智佛說是人名為成就一切種智一切種智由斯而得因果相攝決定無疑是以如來印言成就圭峰二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌理同故即清淨慧當知圓滿菩提性無取亦無證無菩薩衆生二頌事異故六覺與未覺時漸次有差別衆生為解礙菩薩未離覺入地永寂滅不住一切相大覺悉圓滿名為遍隨順初二句頌總標次一句觀行次一句相似二句分證二句究竟缺理即名字亦可以覺未覺兼之私注三頌入位法門末世諸衆生心不生虗妄佛說如是人現世即菩薩供養恆沙佛功德已圓滿雖有多方便皆名隨順智後二句總頌位行雖差皆隨順智私注三不定行證四初威德章顯示行體二初請問三初進問威儀於是威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句三初慶前大悲世尊廣為我等分別如是隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利覺心煥發故曰光明一念頓忘即登圓住不藉劬勞肯綮修證也私注二請後二初舉喻立理世尊譬如大城外有四門隨方來者非止一路一切菩薩莊嚴佛國及成菩提非一方便城喻圓覺門喻行門前說觀行理趣分明今復咨詢忽涉非分故先立理請更投機圭峯二正請行法惟願世尊廣為我等宣說一切方便漸次并修行人總有幾種方便漸次問所修之行總有幾種問能修之人圭峯三顯益令此會菩薩及末世衆生求大乘者速得開悟遊戲如來大寂滅海三三展䖍誠作此語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告威德自在菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是方便汝今諦聽當為汝說二受旨時威德自在菩薩奉教歡喜及諸大衆默然而聽三正答二初長行四初指體標行二初指體開解善男子無上妙覺遍諸十方出生如來與一切法同體平等於諸修行實無有二夫大圓覺體最勝最妙遍一切法生佛一如十方如來皆由證此故云出生以理融行行無不同東陽無上妙覺者性德之體真妄同依遍諸十方出生如來者體量周含諸佛同證與一切法同體平等者體德遍具無非圓覺私注二標舉數方便隨順其數無量圓攝所歸循性差別當有三種隨其根性設教多端循謂循隨性謂根性衆生根性雖有萬差而此三門一切收盡圭峯一即無差三即是差此乃無差之差無非是性故云循性差別當有三種慈室性德之行隨根修入根既不等法亦何窮如病有千源藥生多品然核論性德三諦天然真諦者泯一切法俗諦者立一切法中道者妙一切法至三即一至一即三處凡為三因在聖為三德大論則曰一心三智天台則謂即空假中此經則以靜幻寂為行相也蓋依諦立觀全性發修依真立空破一切惑依俗立假建一切行依中諦立中觀究竟一切性法界絶待然此三觀既全性發實匪修成故於一心宛有三用俱破俱立俱絶對待非次第而入非並別而觀十方如來依此成佛無邊行海圓攝無遺此經三種並存梵音一奢摩他華言翻止以寂靜為相義當空觀二三摩鉢提此翻等至亦云等持以幻化為相義當假觀三禪那此翻靜慮雙離靜幻以寂滅為相義當中觀說雖次第用在一心全三之一一必具三次章縱有單復前後實解圓而行不定耳故此皆標悟淨圓覺下文亦曰踞菩薩乘修寂滅行同入清淨實相住持又云是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切羣品識此意矣不唐駕說又此三皆以觀為名者圓覺章云修此圓覺三種淨觀是名三觀初首方便三種淨觀隨學一事三文稱觀敢不依憑若奢摩他翻止辨音章云清淨定輪者須知寂而能照照不離寂譬如止水無波然後能鑒雖定慧不二從別名觀又觀所依定故稱定輪後偈云無礙清淨慧皆依禪定生楞嚴三名與此不異各從經意三皆名止涅槃中三名義少殊一奢摩他翻止二毗婆舍那翻觀三優畢叉翻止觀等雖二名不同體亦無別禪那以雙遮為離優畢叉以雙照為等也私注方便者所修習法皆以此為門戶故由之而已治病以藥病愈藥何用哉圭峯依經立三觀名一泯相澄神觀二起幻消塵觀三絶待靈心觀同天台三觀空假中也他云異者此明用心方便彼則推窮性相此不立境彼多生解今謂無有用觀而不立境以觀依境立故初心解則俱解後心行則俱行無非方便已如前說天台諸文推窮性相此依龍樹遣蕩觀門為破執故執若已破何必推窮為求當理不敢分宗竹菴若不窮諸法性相妙觀於何處用若不對乎三諦安知全境為智嗚呼當宗尚昧況他人乎慈室二正明行相三初奢摩他三初標解善男子若諸菩薩悟淨圓覺發心修行欲趣佛果先須了悟身中淨圓覺性以為行本本即解也依解而修方為妙行膏明相賴目足更資故下標本皆同此矣圭峰此圓覺體萬行根源苟非先悟則徒為苦行非涅槃因東陽此悟即解悟也慈室二釋行二初修觀破障以淨覺心取靜為行由澄諸念覺識煩動靜慧發生身心客塵從此永滅覺心初建力尚尫微理宜取靜安詳方能展照以靜澄念見分別之識煩勞動擾因靜生慧故名靜慧客非本性塵汙自體身心塵妄不起名滅圭峯身心客塵者煩惱在心約取計說如身見等故云身心鄣南念境也覺觀也若以三觀對破三惑此當空觀發一切智則客塵煩惱體是見思假破塵沙中破無明若準次章單修靜行有曰永斷煩惱究竟成就不起于座使入涅槃既云究竟涅槃合是三德祕藏以證驗修必一觀而三觀三惑一體而破也楞嚴第一陳如委答客塵二字意指見思與今少異私注二行成顯德便能內發寂靜輕安由寂靜故十方世界諸如來心於中顯現如鏡中像由離根境內心自間寂靜清虗輕安調暢喧塵永息粗重長袪十方佛心於中顯現者此明感應衆生圓明性體與佛無殊但以妄情凡聖似隔今身心相盡妄念不生圓覺妙心凡聖交徹理實而言我之身心亦能遍現十方佛中今但約入觀者為主故云諸佛於中顯現圭峰寂靜即真諦之體菩薩證此非小乘固執故云輕安世界依報也佛心正報也見思粗垢既盡則中忘而外融任運與十界凡聖依正同一真空故能眼見障外色耳聞障外聲楞嚴明返流全一六用不行十方國土皎然清淨譬如琉璃內懸明月乃至一切如來密圓淨妙皆現其中亦此位證相鏡喻寂靜像喻依正慈室妙圓覺體德量遍融心佛衆生三無差別智明體顯鑒淨像生此亦三諦圓彰不止真空而已私注三結名此方便者名奢摩他此翻云止定之異名寂靜義也謂於染淨等境心不妄緣故寂靜是顯相止是釋名此既修止三皆名觀者此宗必具理事定慧皆無障礙故約止修觀也圭峰定慧不二準文從別如前已示煥疏用三止釋此行三觀釋幻行求之過矣今所不用私注二三摩鉢提三初標解善男子若諸菩薩悟淨圓覺二釋行三初正示修發以淨覺心知覺心性及與根塵皆因幻化即起諸幻以除幻者變化諸幻而開幻衆由起幻故便能內發大悲輕安心性是識識與根塵各無自性故名幻化諸幻即幻智也幻者即根本無明是能幻之者除幻者依如幻始覺力分覺根本不覺變化等者隨機應化說法開示如幻衆生也根塵既消自他無二故能內發同體大悲悲從定起非其愛見故輕安暢適圭峰幻者即心識根塵大悲乃俗諦之體慈室覺知根塵幻化不實此定境也即起諸幻下正明修觀起幻除幻自行斷惑變化等者化他出假四教四門門門四諦知病識藥授藥方法一一投機故曰變化諸幻而開幻衆然此幻相並須心觀照知歷歷然後起用天台止觀曰如來在昔以漸頓觀心偏圓具足依此心觀為衆生說即其義也由起幻故下觀成所發次章明單修幻行既曰不失寂念及諸靜慧故不可單以俗諦定今所發私注二重明離相一切菩薩從此起行漸次增進彼觀幻者非同幻故非同幻觀皆是幻故幻相永離一切菩薩等復牒所修彼觀下正明離相非同幻故者約智忘境非同幻觀等能照亦寂謂非同幻境之觀亦皆是幻能所俱遣藥病兩忘故云幻相永離私注三總結舉喻是諸菩薩所圓妙行如土長苗土喻性德苗喻觀行觀行增進如土長苗圭峰云如種穀等依土長苗收子之時苗土俱棄種喻覺心土喻幻法苗喻幻智今謂經喻生長何以滅義消之耶況偈云如幻三摩提如苗漸增長鄣南三結名此方便者名三摩鉢提亦名三摩鉢底此云等至等持之中能至聖位故圭峰等至者幻智於彼所化之境平等普至也今直作假觀釋之慈室既前標圓解亦舉一即三所謂一假一切假也圓覺章有云三摩正憶持私注三禪那三初標解善男子若菩薩悟淨圓覺二釋行二初明修相以淨覺心不取幻化及諸靜相了知身心皆為罣礙無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙了知身心皆為罣礙者無知覺之明為能離也非心慮知非身覺觸明者能離之體礙無礙境者能所俱遣亦可礙謂生死無礙涅槃也受用者屬已資緣世界者共居國土相在塵域者依正互相由藉而住自五品來生身得忍皆住分段縱入變易亦未離陰此皆屬礙即無礙故如器中鍠也但法文中未見即無礙義須下喻顯譯者之巧也如器下喻煩惱下合圭峰云鍠字不定恐譯人錯遂為三釋一依鍠字音橫訓和訓樂非器中聲取其聲勢擊罄之類其聲鍠鍠然譯人稍拙二作礦音同即大鐘也或寫錯以鐄為鍠三作簧音黃即笙簧之類以有簧之器非一故不局笙中簧乃云器中簧也此則譯人不善此方音韻文字故字與音俱錯他疏皆依此解今謂圭峯之疏多罪譯師蓋傷於博達矣且一代翻譯文質相稱無出覺救所譯此經豈錯一字遂受不善方言音韻之責廣韻注鍠字云說文音皇何得專以橫音為咎耶世人鞔鼓內藏鐵鍠二條取聲韻之遠今經正取器微聲大以喻即礙處達無礙也鄣南不取幻靜至永得超過礙無礙境顯雙遮二邊正入中道受用下明中道觀體周圓無際相在之相宜去聲呼秪是身心等相一一即中雖局而遍私注二示觀成便能內發寂滅輕安妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想寂滅即中諦之體菩薩住此而不著故曰輕安慈室三諦俱中故名寂滅妙覺隨順寂滅境界者妙圓覺智契中道也自他等者此寂滅境雖遍一切法而離一切相計五陰名衆生執長齡為壽命私注三結名此方便者名為禪那此云靜慮正是雙遮之體此亦直作中觀釋之慈室三總結彰圓善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺此三門皆依悟淨圓覺而起觀行觀行亦皆趣入圓覺始終不離故云親近隨順佛及菩薩同證同修隨機隨事行相各異或多人同修一門或一人具修多行然必皆依此三種業或具修三或單或復具如二十五輪所明圭峰既三皆圓覺又云圓證驗非單淺次第之行隨機同異行體唯三私注四較量顯勝善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法行一剎那頃隨順修習偏小屬權圓乘稱性日月爝火焉得與齊私注二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌標解威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類二頌行相寂靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠三頌總結三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃二辨音章明不定相上三法門約機偏好次第漸修一念圓修或單或復前後更互故曰不定行雖不定解必依圓私注分二初請問三初進問威儀於是辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句三初慶前所聞大悲世尊如是法門甚為希有二問幾修習世尊此諸方便一切菩薩於圓覺門有幾修習前說三觀雖行相分明未審菩薩所修為一人具三為三人各一為前後為同時為依次為超次圭峰三申請問意願為大衆及末世衆生方便開示令悟實相三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習汝今諦聽當為汝說二受旨時辨音菩薩奉教歡喜及諸大衆默然而聽三正答二初長行三初敘意標數善男子一切如來圓覺清淨本無修習及修習者一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪圓覺無修明所依本依末覺等明諸輪意輪者摧輾義能摧惑障令正智轉圭峰本無修習所修之法及修習者能修之人性德無作也依於未覺幻力修習者依於不覺而有始覺修德之行也定輪者大經云能觀心定名為上定鄣南二列示修習三初三輪單修二二十一輪互修三一輪圓修慤疏於此二十五輪約喻各立一名圭峰全用今但準經靜幻寂相科釋也私注初三輪單修三初靜行若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起于座便入涅槃此菩薩者名單修奢摩他二十五輪皆有標列結亦應一一標云悟淨圓覺文繁故略不起法空之座便入寂滅涅槃圭峰初門觀行雖漸發心教法皆圓流通末章云頓機衆生從此開悟亦攝漸修一切羣品是矣只為圓法自在所以隨機入門不妨單復修習從漸入頓也竹菴修時雖單所入涅槃既屬圓頓豈不一即具三下二觀準此慈室問單修一種捨餘二否不捨非單捨則幻行云何不失寂念及諸靜慧答存三用一非捨二輪鄣南二幻行若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧此菩薩者名單修三摩鉢提欲盡化度須佛加被故云以佛力等寂念中也靜慧空也慈室雖變化種種作用既標結云修合是觀心所照妙假亦可自己覺力名為佛力陀羅尼者中道總持圓覺異名耳前文云有大陀羅尼門名為圓覺私注三寂行若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡便證實相此菩薩者名單修禪那滅者絶念也獨者不假諸行是絶待義圭峰滅幻者遮假豈不遮空既雙遮入中又證實相一即具三彌為可信私注二二十一輪互修三初七輪靜觀為首幻寂兼修次七輪幻觀為首靜寂兼修後七輪寂觀為首靜幻兼修此三七中各有三意初二輪復修次二具足修後三輪齊修且初七輪依文分七初先靜後幻若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提二先靜後寂若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那以靜慧故靜也證至靜性寂也煩惱因亡生死果喪圭峰三先靜次幻後寂若諸菩薩以寂靜慧復現幻力種種變化度諸衆生後斷煩惱而入寂滅此菩薩者名先修奢摩他中修三摩鉢提後修禪那四先靜次寂後幻若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸衆生此菩薩者名先修奢摩他中修禪那後修三摩鉢提五先靜齊幻寂若諸菩薩以至靜力心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那六齊靜幻後寂若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那七齊靜寂後幻若諸菩薩以至靜力用資寂滅後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提二七輪幻觀為首靜寂兼修七初先幻後靜若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他二先幻後寂若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那三先幻次靜後寂若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那四先幻次寂後靜若諸菩薩以變化力無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他五先幻齊靜寂若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那六齊幻靜後寂若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那七齊幻寂後靜若諸菩薩以變化力資於寂然後住清淨無作靜慮此菩薩者名齊修三摩鉢提禪那後修奢摩他三七輪寂觀為首靜幻兼修七初先寂後靜若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他二先寂後幻若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提三先寂次靜後幻若諸菩薩以寂滅力種種自性安於靜慮而起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提四先寂次幻後靜若諸菩薩以寂滅力無作自性起於作用清淨境界歸於靜慮此菩薩者名先修禪那中修三摩鉢提後修奢摩他五先寂齊靜幻若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提六齊寂靜後幻若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提七齊寂幻後靜若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修那三摩鉢提後修奢摩他三一輪圓修若諸菩薩以圓覺慧圓合一切於諸性相無離覺性此菩薩者名為圓修三種自性清淨隨順圓頓妙觀造境即中故云圓合一切之言該乎十界依正因果又十界性相法法皆實無非三諦故云於諸性相無離覺性絶念而觀三諦覺性故云圓修三種自性清淨隨順也私注三總結勸修善男子是名菩薩二十五輪一切菩薩修行如是若諸菩薩及末世衆生依此輪者當持梵行寂靜思惟求哀懺悔經三七日於二十五輪各安標記至心求哀隨手結取依結開示便知頓漸一念疑悔即不成就此示修習法式梵行戒也寂靜定也思惟慧也具戒定慧心在觀門如是修行必定成佛懺悔等者多生業纍恐障淨心懺悔求哀發露先罪日數若少慮不精誠三七日中已彰懇禱書二十五輪名字文句置道場中禮拜䖍誠精祈一行若自的樂一門隨便修習若勝劣難分不能自決即憑聖力以卜應信手取之不宜簡擇依所檢結開而視之頓漸自知無貪餘觀心懷疑阻併失前功縱使再修稍難成就據根驗理必在於茲無乃等間輕於事相圭峰懺悔有三作法取相以無生為主語淚俱下故曰求哀東陽三七日非正修且決擇所修耳標者紙簽之類記則二十五名必束聚之次則哀禱我於何觀有種何觀相宜信手於中以一簽結之然後取視或得二十四輪為漸後一輪為頓豈復疑此觀不成悔彼觀不得耶慈室後圓覺章云此觀不得復習彼觀以驗諸輪漸頓不定私注二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌敘意辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生二頌修習所謂奢摩他三摩提禪那三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順如來者長行不言且據因行今具舉因果耳唯除頓覺人并法不隨順者此二長行亦無謂今明不定行證故約漸頓明二十五種若圓頓行證之人并於此法不信順者則不可言無不因此得成菩提故曰唯除等圭山兩解今用次義須者往撿私注三頌結勸一切諸菩薩及末世衆生常當持此輪隨順勤修習依佛大悲力不久證涅槃三淨業普覺二章示法病二初淨業章示我等四病二初請問三初進問威儀於是淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句三初慶前大悲世尊為我等輩廣說如是不思議事一切如來因地行相令諸大衆得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰廣說三種法門諸輪綺互乃於覺性無差別中而辨其相名不思議事調御者十號中一佛具萬德名亦無量如華嚴名號品東陽此悟因行也夫果德稱真約理可照因行治染體解是難今一念備知炳然齊現如琉璃瓶盛多芥子故深慰矣圭峰二今問世尊若此覺心本性清淨因何染污使諸大衆迷悶不入因聞上章圓覺清淨本無修習故今得以扣請慈室染污者須約修德不覺而示性德本覺何染之有鄣南三請答唯願如來廣為我等開悟法性令此大衆及末世衆生作將來眼三三展䖍誠說是語已五體投地如是三請終而復始二佛答三爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便汝今諦聽當為汝說二受旨時淨諸業障菩薩奉教歡喜及諸大衆默然而聽三正答二初長行三初略示二初舉過正酬二初從妄生妄善男子一切衆生從無始來妄想執有我人衆生及與壽命認四顛倒為實我體由此便生憎愛二境於虗妄體重執虗妄二妄相依生妄業道有妄業故妄見流轉厭流轉者妄見涅槃無始者未曾悟故故下有生盲之喻妄想者無中橫計我人等者統為我相展轉約義故有四名四名復有二相一迷識境二迷智境初者情識所計謂取自體為我計我展轉趣於餘趣為人計我盛衰苦樂種種變異相續為衆生計我一報命根不斷而住為壽者如金剛兩論所說天親無著迷智境者證悟覺性而帶能所從粗至細展轉遣之即此經說至文當知顛倒者真我本有迷之謂無妄我本空執之謂有由此下十句初四句由迷起惑次二句由惑造業次二句由業招報後二句反於三道墮於二乘又總當二乘宗中生滅四諦初六句集諦次二句苦諦次一句道諦後一句滅諦由此便生憎愛二境者由執四相為實我體所以於自生愛於他生憎順我者愛違我者憎於虗妄體重執虗妄者四大五蘊迷性妄生衆緣假合已是虗妄更於其上重執我人二妄生業至苦樂果故名為道業成即受生死流轉厭流轉者息緣斷惑見涅槃者趣寂沈空圭峰三道流轉此乃六凡妄見涅槃乃二乘界須知九界背性成迷盡成染污慈室此經四相對彼金剛謂迷智境若望中道究論能執亦是識情以衆生無始未離念故故云妄想執有等又此雖約證悟了覺以辨四相似從粗至細展轉淺深然詳經意恐一一相各有粗細俱淺並深竹庵云此章除四顛倒我為根本我執有粗有細今現行粗執也至於地位中人微細執我自不知覺未能斷除若尚在信解我相浩然況未真正粗執我相全同凡俗其增長我慢蓋學佛者之大病也宜乎熟讀此之一章現行執我如破家賊手鑒文憎愛二境者雖憎愛屬心由心逐境遷以所顯能故云也於虗妄體重執虗妄者認四顛倒為我體從我體起憎愛故云重執私注二障覺成迷由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故是故動念及與息念皆歸迷悶以妄想故障清淨覺然本覺元如迷情自隔非覺違拒不容入也其能入者離念即覺亦非覺性挽之令入動念著有息念沈空是故動息皆歸迷悶前明從妄生妄正答因何染污此段結酬迷悶不入也私注二重核妄本三初徵牒何以故由有無始本起無明為己主宰動念既為背覺息念即合契真何故皆稱迷悶由有無始根本無明為我主故動是我動息是我息我相既在動息俱迷圭峰二轉釋一切衆生生無慧目身心等性皆是無明譬如有人不自斷命背覺已來未逢師教動乖佛慧有若生盲身心諸法無非圓覺以不了故全是無明無明我執如人愛命不自斷也私注三結過是故當知有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就人若愛我則順人若違我則憎以此之計滋養無明從始至今無由得斷慈室相續者本從無明而憎愛憎愛還熏無明種子現行相續不斷將此求道畢竟不成圭峰二廣釋二初列釋四相略疏云然此我等行相殊常常者但約迷執初果已除此乃直就修證羅漢未曉一約事驗我二悟我成人三了迹迹生四潛續如命又云雖約計執淺深說有四相差別然唯是我見故經文除別列四名之外節節皆有我字若除此執便是圓覺詳夫略疏釋此四相已非初心現行粗執鈔指界外塵沙無明今準前文由執我等妄見流轉後文不了四相經劫修道但名有為不成聖果經意正該見思粗垢則知圭山取義太過又約計淺深說四相者且初一相自有粗細淺深之判亦恐不爾竊謂初心學者偏乘暗證未得謂得展轉橫計無越四執是則證非絶念悟猶背性證悟既爾了覺亦然以皆存我俱妄想故故曰認四顛倒為實我體乃至動息皆歸迷悶竹庵指為現行粗執似有眉目若地位中種智未滿我執微在以金剛前皆屬凡故故曰其心乃至證於如來畢竟了知清淨涅槃皆是我相又曰其心乃至圓悟涅槃我人既然餘二例爾經文存略讀者應知俱淺並深匪敢誣也私注文為四初我相二初標顯粗執二初約法標善男子云何我相謂諸衆生心所證者捨妄證真名我相以執所證故竹菴者之一字正指我體慈室心所證者圭峯云心謂第七識所證即第八識見分一切衆生任運執為內我今謂第七名二乘識沈空之心其位已深此文且約凡夫現行見思之我下文證於如來等方竪論七八識耳所言證者取著為義故下云是故證取鄣南二約喻顯善男子譬如有人百骸調適忽忘我身四肢弦緩攝養乖方微加針艾則知有我是故證取方現我體弦急緩慢支體不調手足失度之狀圭峰安則忘身針艾疼楚則認我也譬修行者無證則已有證則著故合云是故證取方現我體然金屑雖貴落眼成翳如下文云云何當知法不解脫彼末世衆生習菩提者以己微證為自清淨由不能盡我相根本此非凡鄙境界學佛高流所當深誠也私注二結指細相善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相心證是能如來下是所也又所證中了知是能涅槃是所不忘能所即是我相圭峰乃至等者非但凡時取證屬我等覺後心轉依之日尚有此我也鄣南二人相二初粗相善男子云何人相謂諸衆生心悟證者善男子悟有我者不復認我所悟非我悟亦如是悟已超過一切證者悉為人相心悟證者覺前非也者字正名人相不復認我乃不作證心悟亦如是同前非也圭峰執能悟為人相竹菴二細執善男子其心乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相圓悟是能涅槃是所殫盡也既入地位雖盡除證理之執尚少存能盡之悟故成人相私注三衆生相三初標示善男子云何衆生相謂諸衆生心自證悟所不及者覺前能悟悟是所覺悟既成所覺又名能展轉無窮皆成能所能所及處皆是相待了此無定故離前非計所不及謂免諸過不覺此計又是衆生衆生者不定執一之謂也亦是衆多生起不斷絶義圭峰對上我人立此一名我相執所人相執能各計一邊非衆生義今衆生相非我非人雙義名衆也鄣南二舉喻善男子譬如有人作如是言我是衆生則知彼人說衆生者非我非彼云何非我我是衆生則非是我云何非彼我是衆生非彼我故借世人語以為義勢顯衆生相非我非彼者以是衆生故非我也既云我是復非彼也非彼我故者非彼人之我圭峰三結指善男子但諸衆生了證了悟皆為我人而我人相所不及者存有所了名衆生相了證者空則我不及了悟者空則人不及存有所了名衆生相者心不忘故即上者字圭峰四壽命相二初正釋善男子云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根即心之照故云清淨覺前三相名覺所了擬將此智修習一切無漏之業又業是業用一切作用之智名為業智雖能除妄而不自除故不自見不自見故猶如命根如命根者兼取相續之義圭峰執無漏智業相續不斷猶如命根名壽者相非世有壽此取如一期報得暖息識三事連持命根不斷以喻執我不斷故名壽者竹菴忘前了見且云清淨存能照覺復若命根者字正指能覺之見一切業智所不自見者恐是凡聖所修業智不自見此能覺微念私注二顯妄善男子若心照見一切覺者皆為塵垢覺所覺者不離塵故如湯消氷無別有氷知氷消者存我覺我亦復如是若心照見前諸妄想稱一切覺此覺未妄皆名塵垢以存能覺覺所覺故故云覺所覺者不離塵故塵垢只是染污之義經意正顯能覺是妄略疏謂一切覺者是前三相讀者詳之湯喻能覺冰喻所覺所覺既盡能覺豈存故云無別有氷知氷消者若執有冰能知冰消則同存能覺我覺前我相故云存我覺我亦復如是略疏謂以喻反顯以法順合也問初章云圓照覺相永斷無明如何此中照覺俱蕩曰顯理須照遣執須亡天台止觀單復四見無言窮逐皆此例也又圓照者不動一法絶念而遊事理頓忘聖凡平等言之不易行者方知私注二迷成法障三初有我失道三初標示善男子末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果是故名為正法末世前三教時長行遠未生圓解終不能成圓教聖果以深況淺博地凡夫故可知矣鄣南正法末世者正宗佛法之末世也夫正法之時修則皆證末世之時人多取相今既取證相則正法亦同末世若遇此教了達病源則雖末世還同正法圭峰釋迦法中正像各一千年理教行果四法俱備名為正法雖有教行證果者少名為像法但存理教行證俱無名為末法末法一萬年非謂全無約多分說東陽二徵釋六初久修如何不證徵何以故劫數既多行又勤苦以何義故不證聖果圭峯二認我取證非真釋認一切我為涅槃故有證有悟名成就故譬如有人認賊為子其家財寶終不成就有何妄法不從我生故云一切慈室賊若在外猶可隄防養之為兒如何撿護又知賊是賊賊無能為認之為兒寧免破敗圭峯三取證如何妨道徵何以故縱使認我取證何以便妨於道圭峯四愛寂憎喧非脫釋有愛我者亦愛涅槃伏我愛根為涅槃相有憎我者亦憎生死不知愛者真生死故別憎生死名不解脫夫生死輪回本由憎愛欲求解脫須盡二源今愛涅槃還是本愛今憎生死亦是本憎棄苦欣樂雖殊憎愛元是本習帶之修道佛果豈成伏我愛根為涅槃者由伏不起似涅槃相以似為真故云爾也本愛涅槃擬除生死愛心既在真生死根愛根憎苗豈名解脫圭峰執我故起憎愛故云我愛及云憎我若以涅槃為二乘所證則愛是法愛即界外別惑真變易生死之根本也煥雲二疏皆用此意但與下讚喜謗嗔義似有礙以證空者無嗔喜故私注五何知證法非脫徵云何當知法不解脫法者涅槃由前釋云愛涅槃者名不解脫故此徵云若愛生死許是繫縛今悟涅槃是寂滅法以何相知云不解脫圭峰六讚喜謗嗔驗我釋謂實證者必無我無我故即無嗔喜今為法嗔喜即知證法非真我未盡故文二初標我未盡善男子彼末世衆生習菩提者以己徵證為自清淨猶未能盡我相根本徵證清淨正是我體慈室二以境驗知若復有人讚歎彼法即生歡喜便欲濟度若復誹謗彼所得者便生嗔恨則知我相堅固執持潛伏藏識遊戲諸根曾不間斷世境違順粗重易明唯就法門最難覺察但言為法嗔彼度此不知此心元是我相潛伏藏識者種子也遊戲諸根者現行也因對外境驗得內心我執猶堅潛藏相續圭峰含藏種子正指第八識若據遊戲諸根應是六識今就圓論通言黎耶慈室三總結善男子彼修道者不除我相是故不能入清淨覺二說病為法二初有我說法善男子若知我空無毀我者有我說法我未斷故衆生壽命亦復如是因聞嗔喜是我妄計我空亡彼讚毀故云無毀我者亦應云無讚我者但文略耳然存我說法我還未斷餘之三相未盡亦然文無人字為成句故私注二說亦成病善男子末世衆生說病為法是故名為可憐愍者雖勤精進增益諸病是故不能入清淨覺四相若存總名為病以病為法誠可憐愍帶病修行故增諸病圭峰三以凡濫聖二初抑聖同己善男子末世衆生不了四相以如來解及所行處為自修行終不成就如來解行離句絶非住相而修豈能成就如執醍醐同毒藥矣私注二起增上慢或有衆生未得謂得未證謂證見勝進者心生嫉妬由彼衆生未斷我愛是故不能入清淨覺未得於理未證於智謂得謂證者增上慢人若自知不證而言證者則根本戒中大妄語罪非此文意見勝生嫉驗出凡情然諸聖人形類不定得與不得內證在心何以辨他未得未證故觀心行以驗真虗夫聖人用心己他無二見他勝進或法教流行念念歡喜必能隨順自驗內心如此或即證悟不虗若自覺己衰他盛則嫉己盛他衰則喜縱令深解妙境但是心之所緣勿錯認之謂得謂證竝由我愛故成障覺圭峰未得三果未證四果謂言證得起增上慢如四禪比丘等東陽三誡勸三初誡勿求悟善男子末世衆生希望成道無令求悟唯益多聞增長我見此誡以心待悟也凡言悟者初無實法心路絶處強名悟耳若將心求悟則愈盛於迷故誡云無令又緣以心求悟遂於經論言句上解會故云唯益多聞殊不知解會分明底正是我人情識故云增長我見慈室諸疏之意必先求悟今再考經竊取慈室苟或不當請馴舊轍無令者禁止之辭私注二勸令加行但當精勤降伏煩惱起大勇猛未得令得未斷令斷貪嗔愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅佛說是人漸次成就求善知識不墮邪見但當之言與上無令相應得未得者決徹大法斷未斷者直截知見貪嗔等者對境忘情也如此操履豈可便認為道如來方與其進故云漸次成就慈室令斷者即下所列貪嗔等也求善知識者商人入海須假導師學者修行必資善友圭峯世有濫學大乘唯言即心即佛既云心是佛心應須行同佛行設或空談相即貪嗔益盛嫉妬彌隆昔時行處寸步不移將恐泥犂未能逃避希冀成佛緣木求魚但恃天真不觀力用詎可得也寄言後德撫臆論心勿負如來慈悲苦口東陽三約失重示若於所求別生憎愛則不能入清淨覺海反顯不生憎愛則入覺也圭峰二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌略示淨業汝當知一切諸衆生皆由執我愛無始妄流轉二頌廣釋未除四種相不得成菩提愛憎生於心諂曲存諸念是故多迷悶不能入覺城城喻覺者法喻各有三義一了心性空衆惑不入如防外敵二見恆沙德萬行圓增如養人衆三道無不通如開門引攝圭峯三頌勸誡若能歸悟剎先去貪嗔癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見所求別生心究竟非成就剎是世界如入唐國率土屬唐蕃境亦爾若到悟境則法法屬悟迷境亦爾癡則長無偈有慢則長有偈無文影略也法愛者愛涅槃也我身者憎愛之本所依既空能依何有悟剎我身皆長無偈有圭峯二普覺章示作等四病二初請問三初進問威儀於是普覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊快說禪病令諸大衆得未曾有心意蕩然獲大安隱禪病者四相圭峰禪豈有病在參者用心差錯耳慈室二請後世尊末世衆生去佛漸遠賢聖隱伏邪法增熾使諸衆生求何等人依何等法行何等行除去何病云何發心令彼羣盲不墮邪見如人有子病者偏憂菩薩大悲先哀末世賢聖隱伏正法將沈欲令廣益當來是故懸興此問又由前云求善知識不墮邪見今問何等是善知識餘文皆顯令彼等者明所為也圭峰五問次第者夫學道必務師師必有法法貴修進修必離病病去行成利他有在復審其始如何發心天台有曰發心僻越萬行徒施故以發心之問終焉然五問意求師為主餘四皆因初問而發若不爾者前已屢明圓覺法門及三種行諸輪修相又令勤斷貪嗔等病但發心義未廣明耳何必至此重興諸問詳後答意初唯廣上求善知識以防末世邪師過謬次答秪是圓覺妙法就法顯離作等四病行乃依師安心覺理修法意歸前諸觀相病亦即上自他憎愛於今但加能治之法及發心等至文皆見聖慈愍物曲盡於斯又此諸意法為至要作止任滅未始發揮苟得大綱羣目皆正故總科此章云示作等四病也私注三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普覺菩薩言善哉善哉善男子汝等乃能咨問如來如是修行能施末世一切衆生無畏道眼令彼衆生得成聖道汝今諦聽當為汝說二受旨時普覺菩薩奉教歡喜及諸大衆默然而聽二正答二初長行五初答求人二初教擇師善男子末世衆生將發大心求善知識欲修行者當求一切正知見人心不住相不著聲聞緣覺境界雖現塵勞心恆清淨示有諸過讚歎梵行不令衆生入不律儀求如是人即得成就阿耨多羅三藐三菩提大心者簡餘乘也知識者善能知真識妄知病識藥欲修行者為行求解正知見者法句經云深解法空無相無作無生無滅了達諸法從本已來究竟平等性相如如住於實際於畢竟空中建立佛法是名真善知識心不住相等者離凡夫煩惱及二乘滯寂現塵勞者即貪等也心清淨者現染而不染也示諸過者以同事攝如淨名云入諸淫舍亦同華嚴婆須蜜等讚歎梵行等者或為利益或有別緣所作非儀暫乖真教秪得貶己承非不得飾非說理以誤凡下此乃不同邪人自造諸過復說非梵行事為其真實令無量人墮大險趣但為同事攝故雖現諸過常須讚歎真實梵行故論云壞見之人雖不壞行不堪與衆生為其道眼雖壞行而不破見者是則人天真勝福田即得成就等結成大益圭峰今有影附聖跡者縱心所為食噉非法自謂得無礙道內實庸愚此即壞見壞行無慚之人惜哉然末世之中四依罕值但能心不住相不壞正見善諳境觀者亦堪依止東陽正知見者深達實相不著二邊也阿者翻無耨多羅翻上三藐翻正等亦云正遍三菩提翻正覺合云無上正等正覺亦云無上正遍知私注二勸承事末世衆生見如是人應當供養不惜身命彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢況復摶財妻子眷屬若善男子於彼善友不起惡念即能究竟成就正覺心華發明照十方剎不惜身命者如雪山捨身涅槃童子香城破骨大品常啼之類儒典尚有竭力事父致身事君何況為法常現清淨順行種種過患逆行心無憍慢者夫菩薩化現權道難測但依法門莫疑其迹不以順行即效䖍誠或覩逆行便生憍慢故智論云於諸師尊如世尊想若有能開釋深義解散疑結於我有益則盡心敬之不念餘惡如弊囊盛寶不得以囊惡故不取其寶又如夜行險道弊人執炬不得以人惡故不取其照菩薩亦復如是於師得智慧光明不計其惡然為師之難為徒不易勿因此誡誤敬粗人欲驗真虗如前簡擇已諳其道如此遵承又此藥治徒師勿錯服服之增病無藥可治以縛解縛無有是處摶財等者前舉身命之難此況身外之易摶者食也財謂錢帛古譯訛略應云段食不起惡念者由前無慢故也憍慢若起惡念便生障覆自心法何能入心華等者覺心既明即慧光開發觸向無染故曰心華稱體無邊照十方剎圭峰摶財者圭峰鈔云準經意的說財食也食有四種此當段食食總段別以段揀餘古譯經論訛云摶食今此三藏承古作摶又不分總別謂摶即食仍略食字故云摶財咸師云天竺不用匙筯唯沈香水一盂飯一盂百味一盂香水潤手而摶飯食此非譯誤鄣南摶聚也聚財寶畜妻子眷屬耳此以常倫況前極劣前云過患乃貪嗔淫妄靡所不為尚不可慢況示同常道而生惡念耶慈室今恐摶秪是食慈室之解未敢去取又咸師義尚須考據私注四威儀中常現清淨者不動日用三業四儀不染諸法自然一切常現清淨竹菴二答依法三初標法離病善男子彼善知識所證妙法應離四病標以妙法釋依圓覺圓覺是所依法故此法離於四病方可依故除病之問下自有答法病無邊要唯此四隨有其一即不堪為師圭峯雖曰知識所證實為弟子所依故下結云作是觀者名為正觀又此妙法須明離病蓋出世醫王慈悲深至不令雜毒而混醍醐私注二釋四病相二初徵云何四病二釋四初作病一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故說名為病初句標名若復下辨相言者意言也彼圓下指體以破後句結名下三節同圭峰作種種行者興心運為身口相助八萬四千波羅蜜門既不能以性奪修並屬偏邪苦行下任止滅意無別途鄣南二任病二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故說名為病任彼一切隨諸法性者如火熱水濕之類各各差別之性又謂妄從他妄真任他真各稱其心何必改作前則驅馳覓佛此乃放縱身心設令善惡不拘即名無記之性圭峰三止病三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故說名為病得諸法無性之性非即覺性非止合故者前云於諸妄心亦不息滅圭峰四滅病四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故說名為病夫覺體靈明不唯寂滅今滅惑住寂豈得相應圭峰作則三學六度名種種行任則生死涅槃無起無滅止則息念達性滅則斷惑歸寂豈為之病才執此念欲求圓覺故皆名病作如是言欲求圓覺二句正是病體慈室三結示正邪離四病者則知清淨作是觀者名為正觀若他觀者名為邪觀將前四行自驗其心隨落一門則知是病故言離者則知清淨然上四門皆是諸經勸讚況前三觀具有斯文今此以為病者有其二意一者四中皆無觀慧二者但以率心偏住一行若能四皆通達不滯一門即此四中竝皆入道故淨名曰但除其病而不除法病除法在即正觀也雖不取四病而慧解昭然不得懼落四中便不建志立節復有聞斯四過離四又更生情便任胸襟別為見解故云邪觀又作是觀者離四也他觀者取四也圭峰若了性具之旨則諸行無作何四病之有乎是故情執則一切皆魔稱性則四皆是藥但乘之有法用之在人如賊為將此將須護將若為賊此賊豈存節節檢之勿使生著依是修觀則正反此則邪私注作止任滅無非妙藥執之成病耳乃知得失其在誰乎正觀邪觀者肇論云見法實知故云正觀若其異者便為邪觀十六觀經如此揀顯以能詮文明觀法故故云觀也在此經正如肇論只取見法揀顯邪正通名為觀竹菴三答修行善男子末世衆生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷瞋恨現逆順境猶如虗空了知身心畢竟平等與諸衆生同體無異如是修行方入圓覺憍慢翳心即不入道又一念瞋百萬障起非唯失道亦墮三塗故皆令斷遠離名逆親近名順又違情曰逆隨情曰順如虗空者心無改易圭峰標云欲修行者結云方入圓覺以所顯能是圓覺行若論觀相義備前章故知求師請法法是圓覺依法起行豈有異途初段重勸事師了知下示安心法重舉師者樂道尊師又初心修行須求依止有咨疑地故身心平等者俱即法界衆生同體者彼己一如妙圓覺行由斯進矣私注四答除病二初指病源善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫自他憎愛前已頻明今復說者是種子故是入道微細病故由此種子難契圓明圭峰才有憎愛聖道難成深究根源故云種子鄣南二示除法若復有人觀彼怨家如己父母心無有二即除諸病於諸法中自他憎愛亦復如是怨親等觀故心無二心無二故即除憎愛自他依正真妄諸法若能圓觀一切平等則諸法上憎愛亦盡故云亦復如是諸疏皆引行慈為釋空煩法相私注五答發心善男子末世衆生欲求圓覺應當發心作如是言盡於虗空一切衆生我皆令入究竟圓覺於圓覺中無取覺者除彼我人一切諸相如是發心不墮邪見此同金剛經中具四心也彌勒頌云廣大第一常其心不顛倒盡於虗空一切衆生廣大心也彼云四生九類我皆令入究竟圓覺第一心也彼云入無餘涅槃於圓覺中無取覺者常心也彼云實無衆生得滅度者除彼我人一切諸相不顛倒心彼云若有我人等相即非菩薩諸佛因地皆發此心依此願修方成正覺圭峯二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌缺頌除病文四初頌求師普覺汝當知末世諸衆生欲求善知識應當求正見心遠二乘者二頌依法法中除四病謂作止任滅三頌修行親近無憍慢遠離無瞋恨見種種境界心當生希有還如佛出世不犯非律儀戒根永清淨如佛出世長無偈有不犯非律儀戒根永清淨乃追頌求師中不令衆生入不律儀之文又今於事師起行中頌者經意互顯師弟相成故私注四頌發心度一切衆生究竟入圓覺無彼我人相當依正智慧便得超邪見證覺般涅槃末一句長無此有梵語般涅槃此名滅度肇師云大患永滅超度四流亦云圓寂賢首云德無不備稱圓障無不盡稱寂亦云寂滅生死永盡故私注四圓覺章顯示方軌二初請問三初進問威儀於是圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊為我等輩廣說淨覺種種方便令末世衆生有大增益二請後世尊我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首唯願大悲為諸大衆及末世衆生施大饒益雖問滅後亦兼佛世故下答云若佛現在當正思惟安居者安置淨居即道場也以何為首者問觀首之方便私注三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生汝今諦聽當為汝說二受旨時圓覺菩薩奉教歡喜及諸大衆默然而聽三正答二初長行二初安居期限二初指前善男子一切衆生若佛住世若佛滅後若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒衆有緣事故隨分思察如我已說滅後兼正像性謂種性即了因也伽藍此翻衆園已說者普眼章云安處徒衆宴坐靜室私注二正說四初要制三期若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十日安置淨居菩薩逢益即為遇緣且赴若無勝利須建道場克志加功以期聖果則三期皆是自行為簡利他故名他事亦可王賊命難名為他事定三期者過則情生疲厭少則功行未圓故重克三期亦無別義然約三根配之有其二意一約障盡難易配長期下根中期中根下期上根二約精進懈怠配者即反於此根有利鈍期有遠近對病設藥斯之謂歟安置淨居者欲使內外清淨身心潔白事理稱可圭峯大聖制此三期為令行者自量己力能長能短何必須對三根耶又此但制日限不制身儀四三昧中即屬諸經行法一科鄣南建道場法先當香泥塗地等故曰淨居慈室二道場修法若佛現在當正思惟若佛滅後施設形像心存目想生正憶念還同如來常住之日懸諸幡華經三七日稽首十方諸佛名字求哀懺悔遇善境界得心輕安過三七日一向攝念佛若在世無勞設像佛既去世須假形儀大論引經云不於泥木生難思想安能知像性等虗空三身宛然四德無減如斯運想則與如來在日無異三七日者正修之前習方便也東陽設形像者或畫或刻託以存想如佛不滅又須達相非相是心是佛方得名為生正憶念莊嚴供具要在盡誠從略只云懸幡與華三七等者三期攝念之前方便禮懺禮佛乞求加被露罪乞除夙障當如諸經行法具有十科見光覩華聞聲感夢或寶字印臂或金手摩頂遇茲勝境身心愈進故曰輕安然遇此境猶屬方便楞嚴所謂暫得如是非為聖證不作聖心名善境界若作聖解則受羣邪是也一向攝念者正修圓覺應當正念遠離諸幻三期所修如是而已慈室懺悔者具云懺摩此翻悔過若別說者懺名陳露先罪悔名改往修來其所懺法不出惑業報等三障攝念者起信論云若修止者住於靜處端坐正意乃至心若馳散即當攝來住於正念正念者當知唯心無外境界圭峯若約文配三種懺法心存目想取相懺也稽首求哀作法懺也一向攝念無生懺也然修圓覺者先開妙解然後起行是故前二不缺無生又此三七圭峰科為限內修行諸疏皆曰期外方便今詳經意一向攝念秪是修上三觀諸輪故今重舉辨音章末三七方便但加施設形像等廣於前耳此中却缺二十五輪標記結取蓋前後互顯修者當以諸疏為準稽首者首至地也周禮太祝辨九拜此當其一一向攝念者三期之內獨一禪床單復圓修無非攝念私注三遇夏安居或於期內遇夏安居雖修大乘未全廢小故安居日對佛陳詞然既不繫徒衆終成依大文為二初教令依大二初標意若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆然建道場或在伽藍或於餘處期限未滿夏首已臨入衆安居則乖誓約作念結夏又雜觀心道場中人由此疑惑如來遠念故為辨明為俗乖律即非因大廢小無失徒衆者六和也圭峯若同布薩則妨攝念若不入衆恐違律範故此決云不假徒衆鄣南二作法律制安居二人對首作法云大德一心念我比丘某甲今依某處僧伽藍大界內前三月夏安居房舍破修治故今依大對佛其詞異焉至安居日即於佛前作如是言我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆比丘梵語此含三義一怖魔二乞士三淨戒尼女也謂女比丘優婆塞此云近事男優婆夷此云近事女謂親近比丘比丘尼而承事故即三歸五戒之士女也小乘局於二衆大乘道俗俱霑某甲者各稱其名夫小大安居略有八異一所依異別界圓覺二假實異定實示現三住持異事相實相四結安異對首作法獨自稱名五成安異身不出界心不起念六失安異身出越界念起背本七還界異身不逾時及界念不間斷而覺八所期異阿羅漢果無上菩提有此八異故云不依及為修等大因緣者不拘小節之意圭峰某甲者通慧僧録云借陰陽支干之數以揀昆仲之次物之始生曰甲則長稱某甲物之初長其形未直曰乙故次稱某乙此下至無繫屬故有三節初二句標次四句釋後四句結實相圓覺平等性智涅槃自性其體一也蓋以理為能表伽藍等為所表不同小乘結界繫屬方所鄣南寂滅者佛行也同入下住持伽藍安居等悉以理性簡於事相故不局方所不繫徒衆東陽與佛菩薩三月安居故云同入平等性智者唯識論四智之一圭山引彼大圓鏡智對今圓覺成所作智對身安妙觀察智對心安則四智具足今謂唯識教道一途此是圓經雖一名偶同何煩曲會疏中此段故略不集私注二結示休期善男子此名菩薩示現安居過三期日隨往無礙示現者謂安居日對佛陳詞蓋不廢小權設如此慈室道場三期已滿小乘夏限未終以本非小乘安居故不妨隨往無礙圭峯四誡勿妄取善男子若彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取三期所修不出三觀彼所聞者前明內發寂靜輕安大悲寂滅等其觀成相尚不可著此外境界不可妄取私注二觀首方便二初三觀方便二初列示三初觀至靜二初正釋善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界覺亦如是善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是覺亦如是例於靜也應云如是初覺從於一身至一世界圭峯修奢摩他靜為初首靜極便覺等方便功成也前文由寂靜故十方世界諸如來心於中顯現如鏡中像今云衆生起念皆悉能知足顯生佛唯心二文一揆私注二誡妄非彼所聞一切境界終不可取二三摩憶持二初正釋善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧廣發大願自熏成種憶想有二意一乞垂加被二欲效修行發願亦二意一設心廣大二所期不退慈室三摩鉢提從憶想入次起弘誓自熏成種若論功成應如前云便能內發大悲輕安文無者略私注二誡妄非彼所聞一切境界終不可取三禪那數息二初正釋善男子若諸衆生修於禪那先取數門心中了知生住滅念分齊頭數如是周遍四威儀中分別念數無不了知漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物修禪那者從數息門入心中了知下功用也生住滅念文略異相一滴之雨此舉最微況諸法耳凡修此門須調氣息不澀不滑或入或出安庠徐數從一至十攝心在數不令馳散天台六妙門暨禪波羅蜜具明修法及證相等非此可備行者住尋私注二誡妄非彼所聞一切境界終不可取三總結是名三觀初首方便前問三種淨觀以何為首故具答已結云是名等也即知前段三觀諸輪雖具釋相趣入方便是此所期圭峯方便有二應以上文攝念之前三七禮懺為遠方便以今三觀初首為近方便慈室二利鈍修習二初利根遍修若諸衆生遍修三種勤行精進即名如來出現于世如來本所示生秪緣勸物修習今三觀既備則萬行已圓故就此人已名佛出又即此人本覺離念名為佛出圭峯二鈍根隨學若後末世鈍根衆生心欲求道不得成就由昔業障當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證根鈍障重故加懺願而隨學之若夙種不對故此觀不得復習彼觀私注二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌六初頌三期圓覺汝當知一切諸衆生欲求無上道先當結三期二頌修法懺悔無始業經於三七日然後正思惟此下缺頌遇夏安居三頌誡妄非彼所聞境畢竟不可取四頌方便奢摩他至靜三摩正憶持禪那明數門是名三淨觀五頌遍修若能勤修習是名佛出世六頌隨學鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前大科第三流通正宗之分法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮流則不滯通則不壅圭峯文四初善首請問三初進問威儀於是賢善首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊廣為我等及末世衆生開悟如是不思議事近慶道場遠該一部圭峯二正請世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地流布此教至於何地者若人於此經教供養寫施聽受讀誦說釋思修如是分布流傳未審此人智慧功德畢竟至何位地圭峯請名意在奉持名既正則奉持有在矣故下無別答流布此教似問至何方所考後答文且依略疏私注三三展䖍誠作是語已五體投地如是三請終而復始二如來垂答三初讚許爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字汝今諦聽當為汝說所問有五略提其二二受旨時賢善首菩薩奉教歡喜及諸大衆默然而聽二正答二初總歎善男子是經百千萬億恆河沙諸佛所說三世如來之所守護十方菩薩之所歸依十二部經清淨眼目此有四義前三約人歎謂諸佛說如來護菩薩歸後一約法歎經之眼目也鄣南推窮迷本照徹覺源理貫羣經義無不盡於此若解諸教煥然若不了之焉知正道故云眼目圭峯十二部經者發軫鈔頌云長行重頌并授記孤起無問而自說因緣譬喻及本事本生方廣未曾有論議俱成十二名廣如大論三十七私注二別答四初答名字奉持是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持是經五名唯教行理第二約教第三顯行餘皆名理前二如上總題并文殊章已釋祕謂真祕密即微密中道三昧統攝萬行故名為王決定境界唯佛極證如來藏性本具諸法故云差別無差之差也敕領斯旨云當奉持私注二答至於何地善男子是經唯顯如來境界唯佛如來能盡宣說若諸菩薩及末世衆生依此修行漸次增進至於佛地是經既顯如來境界故修行者必至佛地前問流布此答修行蓋說者必行前後互顯若以此段總答修習功德其義亦通但對問有缺故作爾釋私注三答得何功德二初舉教攝機善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切羣品譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿漸修者教既是頓乃解圓而行漸也如二十五輪最後圓修是頓餘皆屬漸不讓小流者如百川會海咸失本名喻教之獨圓不兼偏小蚊虻修羅喻漸頓機又淮南子云海不讓水積小成大文此取海能容受讓即拒義云云私注二較量顯勝三初舉施寶較聞名善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義世珍盈剎能為漏果之資妙法一言必獲菩提之報圭峯七寶者一金二銀三琉璃四頗瓈五硨磲六碼瑙七真珠三千世界者小千中千大千廣如俱舍私注二約證小較宣說善男子假使有人教百千恆河沙衆生得阿羅漢果不如有人宣說此經分別半偈小乘極證猶屬無明圓覺法門究竟實際小大權實比較天殊偈有四句兩句為半私注三明聞信顯宿種善男子若復有人聞此經名信心不惑當知是人非於一佛二佛種諸福慧如是乃至盡恆河沙一切佛所種諸善根聞此經教上但聞名今信不惑能信一切皆大圓覺豈是小緣非宿植深厚何以及此前問修習得何功德此但約聞名說偈信心為答則知修者其功尤勝私注四答護持經人汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈前問云何護持答意但莫令魔外惱身心者即是護持然惱身心俱通魔外若以義配外道以邪智惑人令疑是惱心也魔以神力令種種不安乃至病等是惱身也故經說衆魔樂生死外道著諸見二事皆令初心行人退屈實藉護持圭峰上請守護持經之人答云修行蓋持必行問答相顯也私注近世於此續入偈文且言得於南安軍兜率大藏偈云賢首汝當知是經諸佛說如來善護持十二部眼目名為大方廣圓覺陀羅尼顯如來境界依此修行者增進至佛地如百川海納飲者皆充滿假使施七寶積滿三千界不如聞此經若化河沙衆皆得阿羅漢不如聞半偈汝等於來世護是宣持者無令生退屈或謂此偈後人擅作須知佛經正宗之中為順機緣利鈍取解故長行後復作偈頌天竺為散華貫華若入流通任欲傳持正宗之說恐不須偈今復詳偈文與上不合長行自云譬如大海不讓小流意顯今圓不兼偏小偈何得云如海納百川上自云聞此經名及一句義偈何槩云聞經上自云宣說此經分別半偈偈何云聞半偈聞與分別義豈泯齊況下天神聞佛付囑即便稟命故云爾時文意連屬中間豈容別有所說故今不敢書入正經更俟明眼一為決之慈室三天神稟命三初金剛衆爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病消滅財寶豐足常不乏少火首者頭有火𦦨故尼藍婆未詳翻譯金剛者執此杵故若取名者云露肩神此神初發心時常起大願願為力士護修行人其家等者在家衆也凡發大心多有障難障難多種略舉灾病故云乃至今由神護一切皆除財寶豐足備道資緣也不必富奢方云豐足故次但云常不乏少不乏少故進趣妙門不退屈矣圭峯二天王衆爾時大梵王二十八天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安穩心不退轉大梵王者即指初禪王娑婆世界主二十八天王總指三界須彌山王別名帝釋護國天王等別顯四王所以標三類者由梵與釋諸佛轉法輪時皆為請主護世持國使灾害不生故總列外而更別明圭峰三鬼王衆爾時有大力鬼王名吉槃荼與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵吉槃荼者亦云鳩槃荼食人精氣其疾如風變化稍多住於林野管諸鬼衆故號為王來至道場而為上首其數十萬一一若斯依附深山或居巖穴其形可畏通變極多不屬天人住居鬼趣不退屈者無障難故一由旬則四十里一云十六里碎鬼神侵境界者護佛菩提心故圭峯金剛禳灾流通天王安隱流通鬼王折流通也東陽四經家總結佛說此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所說皆大歡喜信受奉行結會既云八部驗上同聞不獨菩薩又天龍等必內證法性外現此形亦是戒緩乘急皆預法會大歡喜者結聞經益無越悉檀復約四教簡示今是圓教之歡喜也慈室大方廣圓覺經略疏序終南山草堂寺沙門宗密述元亨利貞乾之德也始於一氣常樂我淨佛之德也本乎一心專一氣以致柔修一心而成道心也者冲虗妙粹炳煥靈明無去無來冥通三際非中非外洞徹十方不滅不生豈四山之可害離性離相奚五色之能盲處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天大矣哉萬法資始也萬法虗僞緣會而生生法本無一切唯識識如幻夢但是一心心寂而知目之圓覺彌滿清淨中不容他故德用無邊皆同一性性起為相境智歷然相得性融身心廓爾方之海印越彼太虗焉晃晃焉逈出思議之表也我佛證此愍物迷之再歎奇哉三思大事既全十力能摧樹下魔軍爰起四心欲示宅中寶藏然迷頭捨父悟有易難故仙苑覺場教興頓漸漸設五時之異空有迭彰頓無二諦之殊幽靈絶待今此經者頓之類歟故如來入寂光土凡聖一源現受用身主伴同會曼殊大士創問本起之因薄伽至尊首提究竟之果照斯真體滅彼夢形知無我人誰受輪轉種種幻化生於覺心幻盡覺圓心通法遍心本是佛由念起而漂沈岸實不移因舟行而騖驟頓除妄宰空不生華漸竭愛源金無重礦理絶修證智似階差覺前前非名後後位況妄妄起滅德等圓明者焉然出廄良駒已搖鞭影埋塵大寶須設治方故三觀澄明真假俱入諸輪綺互單復圓修四相潛神非覺違拒四病出體心華發明復令長中下期克念攝念而加行別遍互習業障惑障而銷亡成就慧身靜極覺遍百千世界佛境現前是以聞五種名超剎寶施福說半偈義勝河沙小乘實由無法不持無機不被者也噫巴歌和衆似量騰於猿心雪曲應稀了義匿於龍藏宗密髫專魯誥冠討竺墳俱溺筌唯味糟粕幸於涪上針芥相投禪遇南宗教逢斯典一言之下心地開通一軸之中義天朗耀頃以道非常道諸行無常今知心是佛心定當作佛然佛稱種智修假多聞故復行詣百城坐探羣籍講雖濫泰學且師安叨沐猶吾之納謬當真子之印再逢親友彌感佛恩久慨孤貧將陳法施採集般若綸貫華嚴提挈毗尼發明唯識然醫方萬品宜選對治海寶千般先求如意觀夫文富義博誠讓雜華指體投機無偕圓覺故參詳諸論反復百家以利其器方為疏解冥心聖旨極思研精義備性相禪兼頓漸勒成三卷以傳強學然上中下品根欲性殊今將法彼曲成從其易簡更搜精要直注本經庶即事即心日益日損者矣
