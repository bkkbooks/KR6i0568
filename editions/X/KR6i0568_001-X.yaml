久習初學性平等故無非圓覺竹菴二亡修證善男子此菩薩及末世眾生修習此心得成就者於此無修亦無成就圓覺普照寂滅無二於中百千萬億阿僧祇不可說恒河沙諸佛世界猶如空華亂起亂滅不即不離無縛無脫始知眾生本來成佛生死涅槃猶如昨夢圓覺普照寂滅無二者自心已空但有覺照寧有凡聖差別之二冥一如之無心即萬動之恒寂故普照是用寂滅是體佛之所極極於寂照於中者寂照中也阿僧祇此云無數是華嚴十大數之首十者謂阿僧祇一無量二無邊三無等四不可數五不可稱六不可思七不可量八不可說九不可說不可說十不可說即當第九經論多用故此舉之恒河沙者河中沙數也此河於阿耨池東面流出初出象口周四十里金沙混流沙細如諸佛世界者百千萬億僧祇等數之河一一河中一沙一界顯世界多矣然盡虗空徧法界所有世界莫筭其數為欲引機造無邊境故假增積多數爾又淨穢等土皆佛統之故云佛界猶如空華亂起亂滅者緣無自性全體即真一切世界皆依妄念念既剎那不住界亦起滅不停又成住壞空雖各二十增減而世界無量無數故總觀起滅繽紛問法華云我此土安隱天人常充滿云何通答彼據理即事門此約理奪事門二皆無礙不即不離者世界不即圓覺亦不離圓覺如華與空如金與器由不離故覺性奪之成空華由不即故世界不妨有起滅無縛無脫者文通上下上則世界無淨穢故下則眾生本成佛故始知等者始知即始覺本成即本覺始之與本非二覺故然說生本成佛語驚凡聽理越常情佛既罕言愚夫多謗唯是圓覺華嚴餘義含耳圭峰修習成就者全性起修無修無成者全修成性無二者中道雙亡寂照平等於寂照中依正迷悟無非一如故喻空華及昨夢也私註三亡能所善男子如昨夢故當知生死及與涅槃無起無滅無來無去其所證者無得無失無取無捨其能證者無作無止無任無滅於此證中無能無所畢竟無證亦無證者一切法性平等不壞迷時生死無起涅槃無滅悟時非滅却生死發起涅槃稱體而觀都無起滅聖法非新來凡心非滅去又直言體無起滅來去所證之境非得真失妄捨麤取妙能證之心都無分別離於四病圭峯所證者全由性發故無得失取捨能證者亦性德行故無作止任滅此且於能所中離相離病尚存能所故又云於此證中無能無所亡所故云畢竟無證亡能故云亦無證者私註三結酬善男子彼諸菩薩如是修行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶二重頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌觀陰普眼汝當知一切諸眾生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者二頌歷法如是漸修行一切悉清淨不動徧法界無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無來去三頌結酬初發心菩薩及末世眾生欲求入佛道應如是修習二金剛藏章釋成本來成佛由上普眼章末云始知眾生本來成佛故此疑問若本是佛何須前說發心修行斷無明耶分二初請問三初進問威儀於是金剛藏菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二陳詞請問三初慶前所悟大悲世尊善為一切諸菩薩眾宣揚如來圓覺清淨大陀羅尼因地法行漸次方便與諸眾生開發蒙昧在會法眾承佛慈誨幻翳朗然慧目清淨陀羅尼慧性因地法行定性鄣南此是一切行位根本後必躡前故重指也圭峯二正述三疑世尊若諸眾生本來成佛何故復有一切無明若諸無明眾生本有何因緣故如來復說本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱初二句躡前文為疑本也三疑者初疑真能生妄次若諸下疑說妄為真三十方下牒而縱之責無窮過也此三難意者本來是佛煩惱何生若無生中妄生起者如來成佛本同無生無生之中還應妄起成佛義等生否應齊齊生則果佛何尊齊否則因違現事進退不可故有斯云圭峰楞嚴第四富樓那亦有斯難云若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始同今初難但彼兼報今唯約惑後復難云若此妙覺本妙覺明今云本成佛道與如來心不增不減無狀忽生山河大地諸有為相今云後起無明如來今得妙空明覺今云一切如來山河大地有為習漏何當復生今云何時復生一切煩惱考彼答文與今不遠深求問意無越修性若謂一切眾生本來成佛皆如來藏清淨本然者此約德性不變凡聖平等無迷無悟無始無終擬作思惟俱成妄見法華所謂知法常無性天台所謂理具三千也若曰本成佛道後起無明如來今得妙空明覺者此約二修隨緣緣有染淨佛界順修九界逆修既立悟迷強分終始法華所謂佛種從緣起天台所謂事造三千也今金剛藏據性德不變難逆順二修本來成佛性德也異生如來二脩也發起世尊之答釋成前說至佛釋中以性泯修約修顯性三疑俱遣覺智斯圓為諸菩薩最上教誨信不誣矣煥疏謂問但有二初真妄互難二生佛互難只謂此章不問從真起妄乃問真妄不合竝立至下淨業章方問從真起妄耳今謂不問從真起妄此說可爾合三為二其義不然佛自結云是故汝等便生三惑讀者宜審私註三結意請答惟願不捨無遮大慈為諸菩薩開祕密藏及為末世一切眾生得聞如是修多羅教了義法門永斷疑悔通論疑者猶豫為性能障信心別顯五蓋中疑有三一疑自謂己不能入理二疑師謂彼不能善教三疑法謂於所學為令出離為不出離如有病人疑自疑醫疑藥病終不愈今三疑中即疑法也悔是不定之法悔善則惡悔惡則善今請永斷即屬惡也然入道人若未通決生佛同異則或用功多時反自疑悔圭峯三三展虔誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來甚深祕密究竟方便是諸菩薩最上教誨了義大乘能使十方修學菩薩及諸末世一切眾生得決定信永斷疑悔汝今諦聽當為汝說二受旨時金剛藏菩薩奉教歡喜及諸大眾默然而聽三正答二初長行四初反責起疑之本三初總指輪迴善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪迴一切世界總指情器也若不約情何成輪迴次下六對辨其輪迴謂但住有為即屬輪迴心也始終者創變極證鈔云世界最初從心變起直至成佛方得終盡即此計度是輪𢌞見生滅者新新而起念念落謝前後者過去未來有無者住劫空劫聚散者成劫壞劫起止者現行調伏念念相續者情界器界皆依妄念既所依不斷故能依亦然循環往復者器界空已復成情界滅已復生惑業襲習報應綸輪塵沙劫波莫之遏絕取謂取著執我我所捨謂捨離厭苦所依又於根身則厭苦麤障為捨欣淨妙離為取於器界則厭此娑婆為捨欣彼極樂為取若取若捨種種不同皆是顛倒妄心變現輪迴之相圭峰凡夫捨空取有二乘捨有取空菩薩離邊求中皆輪迴也東陽一切世界即三種世間該乎九界始終下六句初三句明輪迴心初句約現在十二支明始終生滅二句約過未十二支過去約前未來明後有無即上生滅義也三句約成住壞空住劫名聚壞劫名散成劫名起空劫名止四句約煩惱故云念念相續五句約苦道故云循環往復六句約業道故云種種取捨如屈步蟲取一捨一圭峰何意約捨穢取淨消經耶鄣南始終等相既是輪迴舉世間法莫不皆然只如一人之身始生終滅或前有後無或前無後有四大之聚散心識之起止煩惑相續苦報循環種種境界或取或捨一身既爾諸法例知未必須約創變極證成住壞空十二因緣等配對而解又煥式二疏通取三乘九界釋輪迴相今謂變易生死其義雖通準下彌勒章顯示輪迴根本且齊五道問法界唯心本無淨穢倘存取捨由是妄情判屬輪迴有何不可曰覈夫欣厭取捨雖謂迷真而起過亦能順教以成功馬鳴立為始覺之基智者稱為淨土之漸但達修即性則欣厭本空況安養一門諸佛共讚往來法界彌顯唯心託彼勝緣速登寶覺實生物歸棲之正路乃聖人汲引之妙權苟惑教宗未之可也私註二真隨妄轉三初約法未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處能觀是輪迴之心故所觀圓覺亦爾如夢見寶物物亦是夢故圭峯二舉喻譬如動目能搖湛水又如定眼猶迴轉火雲駛月運舟行岸移亦復如是由目數動湛水如波搖如人動轉眼睛或手研揑眼角故所見物顛倒轉動也次眼識遲鈍旋火成輪相如人火燒杖頭以手旋之眼識不能迅速趂及即見赤輪之相岸移月運但是雲駛舟行駛者奔流急走之相圭峯四喻者初二喻真妄同源後二喻未出輪迴動目搖湛水喻妄中真定眼隨轉火喻真中妄雲月舟岸喻圓覺性即同流轉也鄣南直解謂猶乃似也火只一塊以眼瞪視之見其迴旋似於圓相略疏作由字更詳私註三法合善男子諸旋未息彼物先住尚不可得何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復諸旋者目眼雲舟喻生死垢心彼物者水火月岸喻於圓覺何況下正合也圭峰上亦復如是一句義似已合前文此但提譬況結之耳私註三結指前疑是故汝等便生三惑指前三疑為三惑非見思塵沙無明之惑私註二喻釋現起之疑二初約性德離妄通釋三疑三初譬喻善男子譬如幻翳妄見空華幻翳若除不可說言此翳已滅何時更起一切諸翳何以故翳華二法非相待故亦如空華滅於空時不可說言虗空何時更起空華何以故空本無華非起滅故不知華因翳有妄執從空而生不知迷真故妄橫執真能生妄既得翳差都不見華因除迷心故得清淨又執早晚更迷猶說何時更翳故云不可問翳差之者或時更起未必永無如何為喻答夫喻者但取當日一席之事不說終身譬如夢覺豈可難云何妨明夜更睡還夢翳華二法非相待故者翳不與華期華不隨翳生但翳故妄見非華實生也圭峯幻翳生華翳除華滅雖翳華起滅而空非有無是知迷悟始終俱成妄見其妙圓覺性生佛同如楞嚴亦曰此迷無本性畢竟空亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空本無華妄見生滅見華滅空已是顛倒敕令再出斯實狂癡經旨炳然若合符節何有三惑而不破也私註初翳華喻能對六根妄除次空華喻所對六塵妄滅鄣南二法合生死涅槃同於起滅妙覺圓照離於華翳迷見生死似華起悟得涅槃似華滅言圓覺離華離翳則雙拂生死無明虗空非蹔有無覺性何關迷悟眾生既知華起約誰更難無明無明生死既空何責本來成佛空華終不再起果位何得還迷由己計度不休見他覺性流轉若如是解頓遣三疑三疑鉤鎻連環不是三科別答下金鑛喻即唯答佛不再迷此疑過深故重喻也圭峯生死涅槃隨緣事也妙覺圓照不變理也若知即事即理則不動一法俱入實際荊溪曰離泯照故全泯照是私註三結況善男子當知虗空非是暫有亦非蹔無況復如來圓覺隨順而為虗空平等本性此以世空喻真空也鄣南虗空世法尚不同華起滅況如來隨順圓覺湛然真常是虗空之體性耶覺為空性者佛頂云空生大覺中又云寂照含虗空復言平等者然圓覺雖是虗空之性而冥合不分周徧法界無分無限無別能依所依故云平等此意者空在覺中空尚常寂況覺為空性豈增減耶喻猶不及故云況復圭峯二約修德顯真別申後難善男子如銷金鑛金非銷有既已成金不重為鑛經無窮時金性不壞不應說言本非成就如來圓覺亦復如是金在鑛中銷鑛金現非銷始有若因銷有銷頑石等亦應得金故知雖假爐冶銷鎔金性要須本有既已成金等者此明在鑛則隱出鑛則顯隱顯雖殊金性常一不應說言本非成就者釋成金性本有也如來圓覺亦復如是者合也前就圓悟之理生佛俱是本真以成普眼段中眾生成佛之義故舉空華元來不起非後始滅法合云生死涅槃同於起滅所以俱通三難今就不壞因果之相故說銷鑛出金華則始終本無鑛乃因銷始盡意云圓頓之理雖齊迷悟不妨成異既有多生習障還須背習顯真真顯則究竟清淨若但用前喻即撥無迷悟因果之相便成邪見若但用此喻即成眾生覺性本來不淨失真常理亦成邪見道理微妙一喻難齊故說兩事故此喻唯答第三難也圭峯此一喻意雖正釋第三佛不再迷之難然既云金非銷有不應說言本非成就義亦兼通前之二難俱為釋成本來成佛至下重頌略舉一喻葢以此也雖兼釋前正意還是別申後難如首楞嚴釋富樓那第二番疑亦舉此喻云又如金鑛雜於精金其金一純更不成雜問眾生本佛背性成迷今日聞熏返迷歸性是則真妄宛有始末經論何云無始無明曰覺理圓澄初非迷悟教門指決似有始終然生性雖真奈從本不達以本不達故無明無始也荊溪染淨不二門取喻云濁水清水波濕無殊清濁雖即由緣而濁成本有濁雖本有而全體是清指要解曰濁水喻迷中染心清水喻果後淨心波喻三千俱用濕喻三千俱體水之波濕常無增減若其清濁必各由緣雖象入則濁珠入則清而其濁緣與水俱有從來未悟故濁在前如山抱玉如沙有金鑛朴本有水雖本濁濁非水性故全體是清智者以譬喻得解請勿再惑私註此章徵釋迷性始終若了此問答何必唐復禮法師說真妄偈問天下學者清涼圭峰皆有偈答若了佛答何必有偈若有始終無非妄見此之妄見起必無因故云有思惟心測度如來圓覺境界如取螢火燒須彌山終不能著有所疑者皆輪迴心妄見盡處唯一圓覺銷金之喻未免涉修須知金性本不假銷不可以喻喻真解脫竹菴三示性令息妄心三初覺性元常善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪迴及非輪迴妙圓覺性平等常住即一切法離一切相私註先標覺心為宗後方拂迹者明非斷滅拂有三節菩提涅槃拂轉依之名也由轉煩惱生死故曰菩提涅槃體雖即真名因妄得次二節皆雙拂對待圓覺性中都無此事若有少見則迷圓覺圭峯二思惟罔測二初舉況善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃何況能以有思惟心測度如來圓覺境界此舉劣況勝也無餘涅槃身智俱寂有思惟心終不能至何況能測圓覺境界私註舉勝彰劣文有兩對初小聖理智對二凡心真覺對意云小聖真智尚不能親到小聖之理況凡心劣於前智真覺又超前理轉轉懸隔何能造耶如百僚尚畏宰相百姓豈親天子圭峯二喻顯如取螢火燒須彌山終不能著以輪迴心生輪迴見入於如來大寂滅海終不能至須彌翻妙高此山四寶所成輪迴心即思惟也私註三指前勸誡是故我說一切菩薩及末世眾生先斷無始輪迴根本若遠指前文即文殊章先斷無明或指餘經皆如是說圭峯取捨皆是輪迴意令先斷今重舉以勸誡也慈室四結斥疑情非問三初展轉妄想善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處二不成方便善男子虗妄浮心多諸巧見不能成就圓覺方便指前疑情為浮心巧見私註三結非正問如是分別非為正問前讚善哉者美其起教此責非正者顯其實理此一段疑最障修證若不徵起末世長迷剛藏所徵意在佛責故知責此之過始彰徵起有功乍看似前後乖違細詳乃始終符合可審翫味妙在斯焉圭峯二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌四初領反責疑本金剛藏當知如來寂滅性未曾有終始若以輪迴心思惟即旋復但至輪迴際不能入佛海長行先舉妄想偈文先舉實性圭峯二頌喻釋現疑譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛略不頌空華影在後段故圭峯三頌示性息妄生死與涅槃凡夫及諸佛同為空華相向明覺性元常與喻中合文意同故空華喻義通前後私註四頌結斥疑情思惟猶幻化何況詰虗妄若能了此心然後求圓覺初二句長行云用此思惟辨於佛境猶如空華復結空果詰者辨也次二句依解起行與前結非正問互顯私註三彌勒章顯示輪迴根本由前章云先斷無始輪迴根本今窮根本及能斷性分二初請問三初進問威儀於是彌勒菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言二陳詞正請三初慶前聞大悲世尊廣為菩薩開祕密藏令諸大眾深悟輪迴分別邪正能施末世一切眾生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見輪迴者前說始終生滅等說妄名邪圓覺名正循環見者如前三惑私註二述今問問意有四先問輪迴根本次問輪迴種性三問行門深淺四問度生方便總而言之不出所斷及能斷也分二初問所斷輪迴世尊若諸菩薩及末世眾生欲遊如來大寂滅海云何當斷輪迴根本於諸輪迴有幾種性云何當斷輪迴根本者雖問當斷意在根本下文即指恩愛貪欲如伐樹求根灸病須穴也於諸輪迴有幾種性者上總云種種取捨皆是輪迴今究種種之言的有幾等墮輪迴數答中即指四生六趣是也圭山於此章科判偶乖起復故準煥疏先此示之私註二問能斷行願修佛菩提幾等差別迴入塵勞當設幾種教化方便度諸眾生初二句問意者道雖平等行有淺深故下答以依二種障五性差別迴入塵勞等者即請下大悲方便化他願力也私註三結請意惟願不捨救世大悲令諸修行一切菩薩及末世眾生慧目肅清照曜心鏡圓悟如來無上知見慧目如如智也心鏡如如境也慈室三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧祕密微妙之義令諸菩薩潔清慧目及令一切末世眾生永斷輪迴心悟實相具無生忍汝今諦聽當為汝說實相者離虗妄也生死涅槃俱寂滅故無生忍者忍是印可決定之義證得諸法常住名無生忍以位對之圓教初住私註二受旨時彌勒菩薩奉教歡喜及諸大眾默然而聽三正答二初長行二初廣答二初答所斷輪迴三初指根本善男子一切眾生從無始際由有種種恩愛貪欲故有輪迴對五塵境起貪欲心三有沈迴無時斷絕法華云諸苦所因貪欲為本故須離愛方免輪迴私註恩愛即惑也貪欲即業也實由煩惱潤業業能潤生故有生死是知輪迴通以惑業為根本慈室二明種性二初總示四生三初命因於欲若諸世界一切種性卵生胎生濕生化生皆因淫欲而正性命既標云一切種性顯是答前於諸輪迴有幾種性之問諸疏失考唯鄣南得之四生性命者果也淫欲因也故下結云愛欲為因愛命為果私註以四生配六道者天及地獄化生鬼通胎化謂鬼子及地行羅剎是胎餘皆化生人畜各四人具四者毗舍佉母卵生三十子胎則常人濕則奈女從枯老奈樹中濕處而生化則劫初畜具四者金翅及龍餘獸皆胎餘鳥皆卵然著地飛空若水若陸微細蠢動或卵胎或濕化不可具分品類皆因淫欲而正性命者淫謂淫染愛著但是情染總名為淫縱使化生亦依業染且約欲界輕重者六受欲交抱執手笑視淫居地交夜摩抱兜率執手化樂笑他化視四洲之人同四王界餘諸異類卵濕胎形心染氣傳難具分析受性稟命莫不由之圭峰二欲滋於愛當知輪迴愛為根本由有諸欲助發愛性是故能令生死相續雖四生性命以欲為因然欲因愛生以愛為本復由諸欲滋發愛性故使苦報輪轉相續私註三結成因果欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果眾生愛命還依欲本者愛謂愛心命謂身命雖欲從愛生命從欲有然由欲業滋助於愛受報無窮故曰還依欲本私註二別明六趣二初別示三初惡趣由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼違順皆是造業之境種種業者莫非三品貪嗔癡慈室由愛彼境境不順心便生熱惱憎嫉憎嫉故起嗔嗔故殺害逼惱打罵陵辱種種惡業從此便興亦可境稱愛心而生耽著淫盜飲啖侵奪綺妄種種惡業文無者略也言種種者十不善等無畜生者取其文順成句以二例知亦可翻譯傳寫脫漏義必合有故華嚴云十不善業道上者地獄因中者畜生因下者餓鬼因圭峯二天人知欲可厭愛厭業道捨惡樂善復現天人知欲可厭者離惡道因愛厭業道者於捨惡法門深生愛樂捨惡樂善者捨十惡樂十善也天人樂報也華嚴云十善業道是人天受生因判云樂報麤相言之若論人間八苦天上五衰地居斫截殘害驅擯豈能免苦若於天鬼畜中開出修羅即成六道圭峯厭業之道五戒十善也慈室三定地又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果知其愛惡愛善俱未免苦棄彼愛心樂修捨法即四禪八定而不知樂捨之心還同彼愛故云還滋愛本增上善果者上二界殊勝依正二報也由於欲界修得此定各隨其地而生彼天圭峯色無色界雖是有為對下欲界故名增上樂捨者趣舉四禪八定之捨支而此樂捨之心本出於愛慈室二總結皆輪迴故不成聖道三勸令斷三初正勸是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴貪欲愛渴是業惑因欲出輪迴先除此二因若不斷苦報無窮愛渴者愛心至切如渴須飲私註二釋疑善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死恐有疑云既令捨愛云何菩薩亦有貪愛故受生耶故此通云示現受生非愛為本但以大悲同事利物故淨名云眾生病則菩薩病圭峯三顯益若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟先能除捨方可勤求如出鑛金始堪為器前但云貪愛此云憎愛者愛境違情故生憎也是知憎亦由愛故雖兼憎意但說愛圭峯前云境背愛心而生憎嫉故兼言耳鄣南能斷三障即名勤求三障斷處心即清淨慈室二答能斷行願二初行性差別二初總標善男子一切眾生由本貪欲發揮無明顯出五性差別不等依二種障而現深淺發揮無明者發揚分布令顯彰也然根本無明但迷真而已本無差別由貪欲不同故熏發之令成五別圭峯小鈔一切眾生枉受輪轉只為一念無始貪愛發揮一切無明境界佛名經云有愛則生無愛則滅故知生死貪愛為本一切大教皆如是說淺深二障差別五性事障麤重為淺理障微細為深淺故先斷深故後除此以障道近遠名為事理五性者若相宗執權教說定性聲聞定性緣覺及一闡提三無佛性菩薩及不定性二有佛性此取善惡性分也今取新熏聞教有所差別一聲聞二緣覺三菩薩四不定性五外道性竹菴此段顯示能斷之行正答前修佛菩提幾等差別之問夫行有深淺由障有理事依障論斷故行顯五性如病有輕重故治之不齊也貪欲無明即二障之體五性差別乃淺深之行又行約法五性約人寄人論法耳發揮者由本貪欲即發無始無明遂成二障蓋牒前所斷顯今能斷菩提行性荊溪祖師曰秪由忘智親疎致使迷成厚薄迷厚薄故強分二惑義開六即名智淺深亦此意焉當知五性非輪迴數亦非約障以論深淺舊解似誤宜究經文私註二別釋二初二障云何二障一者理障礙正知見二者事障續諸生死根本無明親障中道名理障枝末無明牽生三界名事障約界內外對論事理小乘真理望大乘還屬變易生死大乘變易生死對小乘屬真理下明二乘先斷事障即知是見思也鄣南界外非無生死以變易苦輕但云礙正知見見思亦障偏真以分段苦重但云續諸生死東陽二五性三初徵云何五性一凡夫性二二乘性三菩薩性四不定性五外道性圭峰乃開二乘共為五性初凡夫性一段經文科云總明未熏非五性數今觀經意豈以合四為五耶然亦未可會同相宗五性今經但云未成非永無成佛之義鄣南二釋五初凡夫性善男子若此二障未得斷滅名未成佛因緣生法所觀之境六道凡夫也約此未斷未證為一種顯下趣向斷證為四種爾鄣南聞教發心觀智猶弱故事理障全未伏斷莫階賢聖且屬凡夫也簡異第五邪師過謬成外道性私註二二乘性若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界同斷見思同出三界但教有諦緣惑論正習緣覺侵習小異耳私註三菩薩性善男子若諸末世一切眾生欲汎如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃發願斷障義兼四弘二障已伏即當圓教觀行之位悟入者此是解悟二障永滅方是證悟事障若盡入圓十信理障若斷圓教初住極至妙覺私註四不定性善男子一切眾生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果一切眾生皆證圓覺圭峰云以己證知一切有情無不是覺譯經訛也應云證諸眾生皆有圓覺噫圭峰疏序云心本是佛那得輙改此中經文亦有引經一切眾生即寂滅相以證不訛然終未能了一切如來所修所證皆本性德若非性德則名別修別證非圓頓也皆證圓覺與夫本來成佛相去幾何圭峰自謂教逢斯典心開於一言之下不謂此文偶乖經意竹菴略疏此解先德皆不取具如煥疏蓋不明性具故爾學者當依法不依人可也言不定性者修習頓漸或前或後也性雖不定但遇佛圓覺無不趣極故曰根無大小皆成佛道私註五外道性若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎本非外道由不遇真正善知識心行理外故名外道竹菴三結是名眾生五性差別圭峰云若答菩提幾等之文應云菩提五性差別今云眾生五性即知義屬輪迴今謂非也且五性中菩薩性不定性皆悟圓覺豈得亦屬輪迴耶須知菩提乃所學之法眾生是能學之人但造之有差遂成五別鄣南二悲願度生善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛皆依無始清淨願力圓乘真出假位也鄣南大悲乃拔苦之本心方便為設化之通軌形相逆順四攝化物無過於此清淨願力必兼四弘慈室形相者如觀世音隨類應身逆順者或為親友以引之或為怨家以怖之同事者四攝之一意該餘三謂布施愛語利行清淨願力非希望報恩亦非愛見此同體大悲稱性大願性本具之非別新得圭峯二結酬若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域以增上心發廣大願皆無作四弘住佛圓覺即成佛道依願修行即學法門漸斷諸障即斷煩惱發是三願全在度生此是因行障盡下果證也清淨殿莊嚴域皆是所證圓覺境界慈室圓信諸法即大圓覺名增上心普會自他俱入實際是菩薩願一切勝行無願不克如普賢十大願王為無量智行之本也佛意深切智者勉諸私註二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌四初頌根本彌勒汝當知一切諸眾生不得大解脫皆由貪欲故隨落於生死二頌勸斷若能斷憎愛及與貪嗔癡不因差別性皆得成佛道二障永消滅求師得正悟隨順菩薩願依止大涅槃初兩句正頌勸斷中顯益之文因斷必果亡故略不頌輪迴種性又以斷妄即得會真故連頌不定性菩薩性餘三性略得正修行能斷貪欲根無大小皆成佛果故曰不因差別性皆得成佛道因依也私註三頌悲願十方諸菩薩皆以大悲願示現入生死四頌結酬現在修行者及末世眾生勤斷諸愛見便歸大圓覺
