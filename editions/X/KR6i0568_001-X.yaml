body:
  text: 夫經有總題攬別文旨意而立今法王自唱五名備見賢善首章結集者撮要舉五前二又略陀羅尼三字此十一字十是別名異羣典故經字通名聖教通稱故以通從別唯冠此部竹菴釋曰圓覺一性也大方廣一性之有體有相有用也圓覺一性其體大故絕諸分別大小無外竪通三世橫徧十方無一法先此圓覺圓覺即一切法先天地而生包天地而大雖太虗空於此圓覺中亦細物爾其相方故軌持該攝任持自在雖流浪生死受種種身而此圓覺曾不失之故本經云一切眾生皆證圓覺雖依因善友真正信解而此圓覺亦未甞得故本經云圓覺流出一切菩提涅槃及波羅蜜教授菩薩得失皆圓覺相其用廣故此圓覺性潛興密應無有休息無有邊際故本經云覺性徧滿圓無際故六根徧滿八萬四千陀羅尼門徧滿法界以此大方廣義稱歎詮顯圓覺一性具足如是體相用也更無一法在圓覺外離一切相等虗空界即是如來清淨法身依此法身無所不攝故此圓覺亦名如來藏此經詮顯如是之法總號一經名修多羅契理說也此經直指諸法根源高超一切故名了義無過上也經者指此一經始末所說題目分明故名大方廣圓覺修多羅了義經祖述圭峯今按天台宗教須列五章謂釋名辨體明宗論用判教也蓋經之有名名下必有所詮之法為體約何修行為宗得何功力為用然後區別何時之所說何教之所收漸頓偏圓乃為教相故此五義凡釋題目闕一不可又約人法喻三單複具足七種立題此經單法為名覺性為體圓照覺相為宗斷惑成佛為用方等圓頓為教相第一單法為名者大方廣圓覺召所詮之理修多羅了義標能詮之教理教俱法簡非人喻大者法身周徧方謂般若軌持廣則解脫無礙離念之覺即三名圓極聖不增下凡無減毗盧身土阿鼻色心盡大方廣無非圓覺言圓覺者直指法體以大方廣彰其德量即具大方廣之圓覺耳梵語修多羅華言契經契機契理義通諸教此說圓極特稱了義即修多羅中之了義也經者訓常訓法常不可易法乃同遵廣示翻譯有無及教行理三經通別如天台大部問修多羅與經華梵之異雙置題目豈非重繁曰上則總指諸部此則唯目當經對總歎別故非重也又修多羅等是佛自唱經之一字結集體式理當安爾第二覺性為體者經云無上法王有大陀羅尼門名為圓覺又曰圓覺自性亦曰淨圓覺性斯為主質宗用所依雖究竟於法王亦本成於凡下亡名絕朕橫亘竪窮舉一即三至三即一萬行之元首一部之指歸免蹈羣邪當冥此體第三圓照覺相為宗者修行之要是曰經宗經云一切如來本起因地皆依圓照清淨覺相既識圓覺當起圓照圓照智也覺相境也由境發智以智照境境智冥契覺體斯圓幻翳無明當處寂滅一經眾行莫不皆然雖不定漸修未乖圓照第四斷惑成佛為用者宗成顯體惑破果圓經云永斷無明方成佛道因觀覺相達妄本虗不待轉除名虗為斷斷無斷處即佛道成闡教度生於茲備矣第五方等圓頓為教相者總判諸經立以四教三藏唯談生滅正為二乘通教詮示無生衍門初首別明破顯圓彰即具被機進否復有五時華嚴兼別說圓鹿苑但施三藏方等彈訶徧逗四教竝明般若帶通別二正說圓教至若法華涅槃開權顯實扶律談常結會化源卒難備舉伏讀此典當方等部圓頓教攝經云是經名為頓教大乘頓機眾生從此開悟又云是經唯顯如來境界此圓教義又云願我今者住佛圓覺求善知識莫值外道及與二乘又云當求一切正知見人心不住相不著聲聞緣覺境界文既鄙斥小乘義歸方等問經文有云亦攝漸修一切群品得非此部兼偏小耶曰秪一圓教云漸修者圓中之漸耳正如天台圓頓漸次不定三種止觀俱緣實相盡是大乘約行乃用漸不定助至下釋經此義當見問既唯圓頓何異法華曰法華開權非所擬也五章成列一經大義可舉而行覽者悉之罽賓沙門佛陀多羅譯罽賓梵語亦云羯濕彌羅北印度邊鄙之名此翻賤種本賤役人自立君長故也沙門此翻勤息勤行眾善止息諸惡出家之都名按大藏開元目錄沙門佛陀多羅唐言覺救北印度罽賓國人於東都白馬寺譯圓覺經一部不載年月續古今譯經圖紀貞元目錄亦同又北都藏海寺道詮法師疏云羯濕彌羅三藏法師佛陀多羅以長壽二年龍集癸巳持梵本至神都於白馬寺譯成兩卷總二十八紙其度語筆授證義潤文諸德具如別錄譯之言易也易梵為華耳周制達四方之言東方曰寄南方曰象西方曰狄鞮北方曰譯今翻西語而云譯者由漢世多事北方而譯官兼善西語摩騰始至譯四十二章經因以稱焉又寄等四別也譯言通也如東夷西戎南蠻北狄通謂四夷故周禮通稱象胥氏經文大分三段始如是我聞止平等法會為序分於是文殊師利下至圓覺章末為正宗分於是賢善首下訖經為流通分初序分者若例諸經必具通別二序東陽云今但通序雖無發起可用入定集眾兼之以眾集不徒然必有異聞略疏云序中證信便是發起謂佛入大光明藏與一切佛同住眾生清淨覺地現諸淨土菩薩主伴皆入三昧同一佛境以表因果無異凡聖同源顯發此經旨趣如是鄣南云入定同聞俱屬別序通序略於住處及集眾二事具足應云一時婆伽婆在某處與若干大眾俱梵本或具譯師略之私謂經文明婆伽婆入定現土集眾同住語勢連屬若就中間節為別序巉絕不可況佛出同居其現淨土必依舍衛耆山等處經家不云者表發意殊至下更釋今且準圭峰東陽初序分為六初所聞法如是且兼我聞合釋即指法之辭也如是之法我從佛聞佛地論云謂結集時諸菩薩眾咸共請言如汝所聞當如是說傳法菩薩便許可言如是當說如我所聞離釋如是者信成就也肇公云信順之辭若就當經凡聖因果不異圓覺名如唯此因果方離過非為是圭峯文如而理是如名不異是曰無非通指一經所傳所詮皆所聞體約四教簡今獨在圓私註二能聞人我聞即指阿難為能聞人聖人無心隨世稱我我是耳主總攝眾緣一根二境三空四作意故論云耳識四緣生四緣和合故稱聞也私註若約此經旨趣傳法菩薩以我無我不二之真我根境非一異之妙耳聞真俗無礙之法門也圭峯三聞法時一時師資合會說聽究竟總言一時異餘時也又諸方時分延促不同故但言一時若約當宗即心境泯理智融凡聖如本始會此諸二法皆一之時圭峯四說法主婆伽婆佛地論云薄伽梵聲依六義轉一自在二熾盛三端嚴四名稱五吉祥六尊貴五不翻中即多含不翻私註涅槃云能破煩惱名婆伽婆如來之異號也亦名薄伽梵梵音楚夏耳此經教主四教三身當是何佛圭峰云法報不分非應化矣如此定身有何準的今謂決是他受用報法性尊特但尊特有二一曰現起華嚴所明藏塵相是二曰示現即應娑婆三十二相但約業識中道感應一一稱性相相無邊法華光明尊特身是此經既現淨土被圓頓機非示現尊特孰為教主慈室五說法處入於神通大光明藏三昧正受一切如來光嚴住持是諸眾生清淨覺地身心寂滅平等本際圓滿十方不二隨順於不二境現諸淨土藏即寶性法界藏起信心真如是諸佛眾生之本源神通光明之性體塵沙德用竝蘊其中百千通光皆從斯起故云藏也亦名法性土亦名常寂光息諸分別智與理冥名為入矣安住藏中不受諸受名為正受圭峯此經說處即事而真匪離娑婆別論常寂為表正宗所談覺性平等故入於大定即首楞嚴禪三德理藏此藏圓具凡聖同源橫亘竪窮不思議一然理不自顯從理垂教教主身土全體起用故曰於不二境現諸淨土所現淨土即說法處通序兼別意亦可了古德皆謂大光明藏是經說處又文關西答舒王曰頓乘所演直示眾生日用現前不屬古今非干時處且楞嚴等亦明住處非頓乘乎前云一時豈無時他又光明藏乃現土之本何得據本便為說處昧所現土耶二說不可今釋分二初入冥覺性二於不二下即體現土初又三初標三德妙定二一切下顯凡聖體同三身心下明稱體圓徧神通光明定慧用也藏即法身體也二用即體三德具足稱祕密藏智冥此境故名為入三昧正受華梵雙彰不墮邪思故名正受一切如來光嚴住持者同一圓明交參互照安住不失也是諸眾生清淨覺地者真妄一際染體元空始本同依也平等本際竪深也圓滿十方橫徧也不二隨順者常一不移以身心依正生佛自他俱寂滅故現諸淨土者即寂光體隨類普應見三土也此經對告俱是法身正當實報經末亦有八部雜眾通餘二土然此現土豈離娑婆義同法華三變之淨問土既現淨佛豈常身曰現起無文示現何爽法華亦爾於此勿疑問法華開權可云示現昔經安得從劣辨勝曰二乘在昔彈斥淘汰故須現起方曰尊特今對菩薩現與不現無妨化意圭山謂不二隨順譯者迴文不盡應云隨順不二煥師謂不二體也隨順用也直解謂諸字訓於恐皆未允讀者詳之私註六同聞眾與大菩薩摩訶薩十萬人俱其名曰文殊師利菩薩普賢菩薩普眼菩薩金剛藏菩薩彌勒菩薩清淨慧菩薩威德自在菩薩辨音菩薩淨諸業障菩薩普覺菩薩圓覺菩薩賢善首菩薩等而為上首與諸眷屬皆入三昧同住如來平等法會初標數列名二與諸下同佛入定菩薩等者具云菩提薩埵摩訶薩埵菩提翻覺薩埵翻有情摩訶大也此有情信大法解大義發大心趣大果修大行證大道故華嚴中地前云摩訶薩今是地上圭峯列十二名者敬依天台章疏用三觀解觀是菩薩萬行之本故文殊師利此云妙德大經云了了見佛性猶如妙德等觀合三德祕密圓備故名妙德又云妙吉祥普賢大論觀經同名徧吉今居伏道之頂其因周徧曰普斷道之後鄰於極聖曰賢苟非三觀一心豈階眾伏之頂普眼者三觀研心普見諸法生佛無二此含悲智謂普見諸法清淨名大智普眼普見眾生成佛名大悲普眼金剛藏者金剛具三義堅則物不能壞利則能碎一切明則體上瑩徹觀心三德具足名藏彌勒此云慈氏慈有三種生緣法緣無緣以對三觀又慈從姓名阿逸多此云無勝三觀能淨三惑名清淨慧三觀能摧伏三障四魔名威德自在由三觀故獲三陀羅尼四無礙辯名辯音三觀對治三道名淨諸業障三觀徧觀諸法同歸實際名普覺亦即圓覺賢善首者賢則亞聖善則順理三觀順理為萬善首也東陽同住如來平等法會孰為其主孰為其伴孰為問者孰為答者無非遊戲大圓覺海竹菴此經入定若比餘經存沒三異一者餘經出入此但語入會末無出定之相二者餘經但言定體如法華云無量義處金光明云甚深法性今經具言體用入於神通大光明藏體也於不二境現諸淨土用也三者餘經教主自入此經主伴同入何故爾耶此經既談圓覺止觀之義非禪不智故首尾在定況十二菩薩發起此經必先入定鑒現未機然後啟請又具二種莊嚴故能問能答也純被圓機見那伽常在定何出之有定慧體合必有妙用法華雖亦純圓既非專止觀正欲開顯小乘故須出定不明定用小機未了豈同入三昧耶鄣南經末流通既有雜眾豈應主伴盡入三昧恐語菩薩同佛入耳況最後無起定之文與光明異未應說聽始終在定問者既云起座禮佛教主一一讚許發揚但恐序末譯人略起定文耳佛境難思後賢審之又法華光明但言定體者且放光現瑞出敘經王亦何局體耶今雖非要不可不知私註二正宗分有十一問答圭峰判初一明信解後十明行證復論上中下根東陽分為七科咸師以初章同止觀開解後十章擬對十乘略評如鄣南疏鄣南自作廣略二門初五番略明圓覺後六番廣明圓覺其分科生起甚詳慈室以前二章開解後九章修行今謂諸師各擅其美不暇廣評謹準北峰例天台三種止觀俱是大乘同緣實相約行收機以漸不定助大分三段初二章明圓覺行證次四章明漸次行證後五章明不定行證初又二初文殊章正明圓頓行證二初請問三初進問威儀於是文殊師利菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言此結集家敘也於是二字圭山謂之指法之辭慈室謂躡前之語又以於是顯通序兼別求之過矣下諸章初皆云於是又如何解即從座起者曲禮云請業則起請益則起右繞西竺禮也長跪者有云雙膝至地與翹跪異下請於上曰白私註即從座起等者從法空之體起悲濟之用以己最勝之頂禮佛最卑之足敬之至也敬是意業意業無狀故以身口表之經標白言及下歎大悲即口業矣右繞隨順義也表順覺性三匝者敬佛一體三寶滅我三道等惡長跪者安危不易叉手者信解合體心境交參圭峯天台章疏多以叉手表權實合東陽二正述請問三初問如來因行二問菩薩發心三問末世離見問文殊位階等覺云何問發心義耶答若約順機發起權設此問則無往不可若約實行竪深猶有後心十乘十境橫論亦容不達同淺位發問故諸佛要集經文殊不能起離意女定下去諸大士疑問例此可通鄣南初問如來因行大悲世尊願為此會諸來法眾說於如來本起清淨因地法行果具萬德偏舉大悲者咨詢法要本為眾生故具足十號稱世間尊求證圓覺故名法眾佛昔初發菩提之心圓照本源染體悉淨依此造入無上覺城故云本起清淨因地法行夫求佛者必正其因因若非真果終不克故下如來廣申此問餘二略結私註過去菩薩乃現在如來之因地現在菩薩實未來如來之因地以至永永若欲斷無明成佛果誰不由斯正道乎故下曰能使末世眾生不墮邪見慈室二問菩薩發心及說菩薩於大乘中發清淨心遠離諸病大乘之體是本始覺於覺悟中發菩提心正念真如故清淨矣偈中直云菩提心也華嚴云忘失菩提心而修諸善根魔所攝持既為所攝即過患眾多故請發心因緣令得永離且中間忘失猶被攝持況都未發心諸行豈離彼業一發之後永無忘失無忘失故魔惑不嬈下佛答有無俱離覺照亦泯能所絕等即離諸病此乃不發一切心名真發清淨心也圭峰夫大教發心當信一切法唯心體具全心發生互徧互收即遮即照離性離相皆真皆如心佛眾生三無差別是則塵勞妄想即大圓覺苟不如是非阿耨多羅三藐三菩提心矣私註三問末世離見能使未來末世眾生求大乘者不墮邪見佛滅度後正法像法各一千年末法萬年末法即為末世去聖遙遠深可懸憂故顯益中偏垂結指圭峰末世發心多滯偏權及雜魔外若無正解寧免著邪私註三三展虔誠作是語已五體投地如是三請終而復始正語而禮非儀也五體四支及頭若惟一度未展虔誠若過於三禮煩則亂故三周終始顯示真心佛雖已知垂範應爾圭峯請至三者敬人重法之至也東陽二佛答三初讚許爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩諮詢如來因地法行及為末世一切眾生求大乘者得住正持不墮邪見汝今諦聽當為汝說先讚後許再言善哉者智論釋云善之至也善男子者順理曰善男子剛斷汝等者雖一人之言言眾人之意得正住持者安心覺海任持萬行誡令審諦勿雜餘緣圭峯淨名曰無以生滅心行說實相法既不可以生滅心說亦不可以生滅心聽東陽二受旨時文殊師利菩薩奉教歡喜及諸大眾默然而聽既蒙許說願樂欲聞潔己虗心收視反聽而寂然也讚許佇聽之文下十一段皆同此釋圭峯三正答二初長行二初廣答初問二初總示二別釋總示中三義圓覺經體也圓照經宗也永斷無明經用也此則依體修宗宗成有用至別釋中先示無明次明覺智後顯覺體則是達妄成修修必依體總別相映覽者應知初標示二初依體立教善男子無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩如來於法自在更無有上陀羅尼翻總持謂圓覺體中有塵沙德用從本以來持之不失故大即當體無邊門者出入義也荷澤云知之一字眾妙之門名為圓覺者上述義相今指法體也非別有法從中流出於外但依覺性顯示諸門功德無有窮盡應用無有疲厭名為流出菩提翻覺涅槃義翻稱為圓寂謂覺性既圓無法不寂及波羅蜜者此云彼岸到翻對六蔽略有六種總翻諸染即八萬四千非但流出理果亦及因也依之修行能生物解名為教授圭峯囊中之寶探以示人故云流出究竟十界故云一切揀異在纏故云清淨真如中也菩提真也涅槃俗也及波羅蜜者依上三諦之境起八萬行門也教授菩薩者教所被機也鄣南無上法王究竟果佛也夫中道總持復名圓覺何人不具何法不然剋論證知故言佛有即此圓覺當體為門全性起修依理設教義言出耳所謂從無住本立一切法世教亦云誰能出不由戶何莫由斯道也慈室以圓覺為能通門今所不韙私註二照性斷惑一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道覺相性也圓照修也全性發修以修契性性非染汙故云清淨無明體空修惡即性畢竟寂滅故云永斷成道者覺智徧滿一成一切成諸法同體而成一人發真虗空銷殞方是圓佛成道之義一佛既爾十方三世諸佛咸然私註二所釋三初委明惑相體虗二初明惑相三初徵云何無明不了一法界故名曰無明有通別枝本正使習氣今約圓照正斷根本別惑通及二習無不該攝私註二釋二初標定善男子一切眾生從無始來種種顛倒猶如迷人四方易處三教九界未能了性盡屬一切中攝起無初相故名無始以悟為迷故名顛倒情竇一鑿狂瀾肆流錯亂多途計執非一故云種種慈室今且按定其非但云顛倒未顯其相倒有所執顛則荒狂如人乍至川原或入聚落忽然心惑以東為西既一方迷餘三俱轉故云易處正迷之時方亦不轉忽然醒悟還是舊方返推此迷了無蹤跡無本來處無今去處圭峯二釋相二初法喻示相妄認四大為自身相六塵緣影為自心相譬彼病目見空中華及第二月四大和合假名為身緣慮之心因塵故有如影逐形生故云緣影眾生不知常住真心性淨明體亘徹三際周徧剎塵妄執身心起諸結惑如棄百千澄清大海認一浮漚爾上明顛倒且喻迷方今執身心故譬華月翳目所喻即上顛倒顛倒故執由翳見華文意法理莫不如是私註翳眼觀空裏無華妄見華揑目望月輪月邊別見月空華幻月皆喻妄見亦可別配二喻謂華喻認身月喻認心圭峯二即喻顯迷善男子空實無華病者妄執由妄執故非唯惑此虗空自性亦復迷彼實華生處由此妄有輪轉生死空本無華而執謂有故曰惑此虗空自性華從翳生而不自省故曰迷彼實華生處從執為實故名實華慈室月喻例華亦應云月實無二揑者妄執經文影略故不具之既執華從空生不知從翳而起翳則實是華生之處非真實華但恠空裏有華不覺眼中有翳外嫌身心苦惱不知內畜迷情圭峯由惑造業因業受報往來六道生死循環不識妄源云何解脫私註三結故名無明二顯體虗三初標體虗善男子此無明者非實有體修惡即性障體元虗私註二約喻顯如夢中人夢時非無及至於醒了無所得如眾空華滅於虗空不可說言有定滅處何以故無生處故先約夢事喻無明本空次提空華顯夢無生滅無生處故者前據能見翳目稱實華生處今約所對虗空生滅叵得矣圭峰約迷悟料揀煥師不取煥却以妄華為實華今亦未然私註三結流轉一切眾生於無生中妄見生滅是故說名輪轉生死雖曰無生由妄見故說名輪轉私註二釋成圓照覺智二初達妄本空善男子如來因地修圓覺者知是空華即無輪轉亦無身心受彼生死非作故無本性無故修圓覺者牒前所照知者照達之謂私註即無輪轉無生死法也亦無身心無生死人也既知空華豈有輪轉還丹一粒點鐵成金真理一言點凡成聖照五蘊空度一切厄外遺世界內脫身心不計身身同虗空不計心心同法界圭峯無明本來自性空寂非由今日滅破方無智者云陰入皆如無苦可捨塵勞本清淨無集可斷以性奪修諸行無作鄣南三結成妙觀彼知覺者猶如虗空知虗空者即空華相亦不可說無知覺性有無俱遣是則名為淨覺隨順知覺空者泯彼能觀知能觀空亦空華相如前火之木然諸薪已亦復自然此空觀也亦不可說無知覺性假觀也有無俱遣中觀也言雖前後用在一心言慮頓忘故云淨覺覺智契理故云隨順又稱淨覺之隨順乃即境之照也據此等文是圓行相如何圭山科為信解私註三徵顯所依覺體何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿徧十方故前明妙觀必全境發境若不顯觀無所依是故徵顯令諦觀一又觀是圓照境即覺相觀若非覺照不名圓境若不圓此相非覺虗空性故常不動故者真諦也真性如空本來不動如來藏中等俗諦也體具諸法清淨本然生滅既亡知見寧及如法界性等中道也究徹三際圓徧十方絕待難思互融互攝是三即一舉一即三魔佛同途依正何別前云有無俱遣中觀雙遮此曰究竟圓滿中諦雙照觀諦互顯佛言妙矣圭山謂法界性與如來藏體同義別在有情中名如來藏在非情中名法界性此涉宗眼學者悉之私註二結酬三意是則名為因地法行菩薩因此於大乘中發清淨心末世眾生依此修行不墮邪見上問有三廣答因行而牒酬之無餘蘊矣私註二重頌非孤起偈也或為鈍根重說或為未來之徒或為增明前說凡言長行偈頌相望例有五對謂有無廣略離合先後隱顯今經問目皆長有偈無答皆長廣偈略餘隨相當對文當指圭峰長行備偈中略赴機宜樂耳亦以略攝廣令易憶持故分二初標舉爾時世尊欲重宣此義而說偈言二正頌二初頌廣答三初頌圓照覺智文殊汝當知一切諸如來從於本因地皆以智慧覺二頌惑有體虗了達於無明知彼如空華即能免流轉又如夢中人醒時不可得長行先釋無明偈中先頌覺智以智照惑故言了達私註三頌所依覺體覺者如虗空平等不動轉覺徧十方界即得成佛道眾幻滅無處成道亦無得本性圓滿故即得下二句長先偈後成道亦無得長無偈有圭峰又如夢中人下四句頌空也覺徧下二句頌假也一佛成道法界無非此佛之依正故云徧十方眾幻下三句頌中也具乎遮照眾幻滅無處遮空也成道亦無得遮假也本性圓滿故雙照二邊無所缺減也問下威德自在章方立三觀如何此中便具出之答下文為未了者特立顯名名出下文義貫初後鄣南二頌結酬菩薩於此中能發菩提心末世諸眾生修此免邪見二普賢章決疑的示頓相圓頓法行已示宏綱次在斯章決疑令喜分二初請問三初進問威儀於是普賢菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正述請問三初總問起大悲世尊願為此會諸菩薩眾及為末世一切眾生修大乘者聞此圓覺清淨境界云何修行前明圓照覺相永斷無明諦觀體如修證義足今復問云何修行者但決餘疑複疎前義耳私註二別徵難三初難以幻還修於幻世尊若彼眾生知如幻者身心亦幻云何以幻還修於幻此問從前知是空華即無輪轉等文而來意云身心既如幻能知亦是幻將幻還除幻幻幻何窮盡幻者謂世有幻法依草木等幻作人畜宛似往來動作之相須臾法謝還成草木然諸經教幻喻偏多良以五天此術頗眾見聞既審法理易明及傳此方翻成難曉今依古師解華嚴如幻之文法喻各開五法喻中五者如結一巾幻作一馬一所依巾二幻師術法三所幻馬四馬有即無五癡執為馬法中五者一真性二心識三依他起四我法即空五迷執我法下諸幻喻皆倣此知圭峯二難幻滅無修幻人若諸幻性一切盡滅則無有心誰為修行云何復說修行如幻若以幻故一切皆空能所總無遣誰修習圭峯三難不修云何解脫若諸眾生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫眾生正覺理具情迷若非全性起修無從解脫故難雖有三意歸修行私註問前具三觀三諦之義如何此中但問真空一義耶答三觀俱幻何獨真空如二十五王三昧皆具三諦鄣南三申問意願為末世一切眾生作何方便漸次修習令諸眾生永離諸幻論云若人唯念真如不以方便種種熏修終無得淨對於蹔離故言永離謂初觀一體雖覺全真後遇八風紛然起妄行如窮子解似電光何法修治永離諸病圭峰此雖問於方便漸次然意且明圓頓行證故下世尊違問而答云知幻即離不作方便離幻即覺亦無漸次永離諸幻修惡即性極在妙覺私註三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生修習菩薩如幻三昧方便漸次令諸眾生得離諸幻汝今諦聽當為汝說末世眾生下義有問於如來之句私註二受旨時普賢菩薩奉教歡喜及諸大眾默然而聽三正答二初長行三初略示所依善男子一切眾生種種幻化皆生如來圓覺妙心法華云知法常無性佛種從緣起淨名曰從無住本立一切法故知九界實造佛界權施皆圓覺性之所發現諸大乘教詮旨咸然是則以幻心觀幻境皆依覺性稱性無作名為幻行此行具足諸法三諦圓融幻盡覺圓了無增減故曰竝由理具力有事用若不先明覺性為行所依縱云修幻乃偏教中無體空耳私註今文且約機應分對故以眾生為幻如來為覺種種幻化者九界三道依正假實也圓覺妙心者佛界三百法門也煥相對云三百圓具即三千二廣釋前難二初明幻滅覺存釋前二難三初喻顯猶如空華從空而有幻華雖滅空性不壞上文云空本無華病者妄執今云華從空有者欲顯華滅空現故略於眼翳徑將華對空說其實因眼有翳故見空中生華應知病眼見空華時其華全體是空翳除華滅而虗空之體本無增損慈室幻華雖滅者闡提斷修善諸佛斷修惡也空性不壞者性之善惡闡提與佛莫斷纖毫鄣南二法說眾生幻心還依幻滅諸幻盡滅覺心不動上說幻從覺生染緣起也此明幻盡覺滿淨緣起也圭峯上二句釋前初難以幻修幻下二句釋前次難幻滅無心既知幻從覺生從真起妄即識返迷歸悟全性起修則以幻修幻無可疑也況覺性圓常俱體俱用諸幻雖盡不入斷滅則幻滅無心誰為修行難亦自釋又諸幻盡滅者復性名滅非破滅也私註眾生幻心還依幻滅者創心修觀莫不以見思王數為發觀之始從真起妄本無明心返妄歸真亦無明心如以聲止聲以楔出楔也覺心不動者雖三惑所熏之心有生有滅而能觀三種妙觀未始改張故云不動鄣南三拂迹依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是是故幻滅名為不動覺性平等離諸言相對幻說覺或有或無咸成語見幻覺頓忘有無俱泯則不動覺體當處顯現私註初二句正示次二句牒上對幻說覺後二句示無覺亦幻此亦作下以幻修幻之張本幻滅不動者再結覺體慈室依幻說覺亦名為幻者對幻說覺猶屬順迷相待之義既涉言思覺成不覺學者應知創心入道對境立觀之日須分幻覺用觀照境之時真妄泯合若說有覺猶未離幻者未離見思也說無覺者亦復如是者未離塵沙也是故幻滅者二邊心滅即斷無明中道得立三觀皆中方名不動鄣南二約勸修幻行釋第三難三初法善男子一切菩薩及末世眾生應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻一切菩薩等標指當機也應當者誡勸也離幻有四一離諸幻之境境為所離智為能離二離離幻之心由堅執有能離之智此智亦幻故曰心如幻者亦復遠離三遣離幻之離離前能離此離亦幻故云遠離為幻亦復遠離四遣離離之離離前第三此心亦幻故云離遠離幻亦復遠離此之四番皆是以幻修幻列雖次第修在一心所謂一念不生前後際斷得無所離即除諸幻者結示得體除幻學者果能向幻覺未兆之前如來未說示處體之照之覺性本然得無所離則何德不顯何幻不除天台謂之本自二空圓離四性下文云若得如來寂滅隨順本無寂寂及寂滅者是也慈室先示陰境一切幻化虗妄境界者一切雖多不出九界三科之陰內境則心外境則色因此妄境生起妄能伐樹得根諸幻息矣次示妙境由堅執持遠離心故心如幻者亦復遠離者堅執是見思心遠即達真諦也遠離為幻亦復遠離者達塵沙即俗諦也離遠離幻亦復遠離者達無明二邊即中道雙遮也得無所離即除諸幻者結成妙境損之又損以至於無為鄣南大圓覺體動念即乖分別不生方能契合故結云得無所離即除諸幻同上是故幻滅名為不動變其辭耳東陽二喻譬如鑽火兩木相因火出木盡灰飛煙滅如有一段乾木以一木燧鑽之火出還將却燒二木木火既盡煙自然滅既成灰燼任運飛散木段喻所修幻妄木燧喻能修幻智煙喻離火喻遣經文先云灰飛譯之倒也圭峰鑽火之喻喻上觀境兩木即境觀火出喻見理木盡喻能所俱忘灰飛喻惑落煙滅喻情亡圭峰云經文先云灰飛譯之倒也合是煙先滅餘灰飛散式師云灰猶有實煙最浮虗亦不須責譯文之倒但今謂約喻喻法何須難喻鄣南三合以幻修幻亦復如是諸幻雖盡不入斷滅上二句正合今勸修幻行釋第三難舉初難之詞為合法者葢問雖有三意歸修行故也下二句重結所依覺性常住使修行者永無疑網私註三頓相結酬善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世眾生依此修行如是乃能永離諸幻修圓觀者造境即中不假事禪方便三觀一心亦無漸次知幻即離結妙境也離幻即覺結妙觀也一切下結酬所請鄣南前云作何方便漸次修習故佛結答不作方便亦無漸次會通問文也能知是幻已名為離但得離幻即元是覺更無階級漸變為覺如人夢見身瘡問醫求藥窹來既知是夢更欲作何方便若待方便修之漸離即是實法何名幻化若執實有還是妄計何名修行圭峯二重頌二初標舉爾時世尊欲重宣此義而說偈言二正頌四初頌所依覺體普賢汝當知一切諸眾生無始幻無明皆從諸如來圓覺心建立無明之言長無偈有圭峰二頌幻滅覺存猶如虗空華依空而有相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故展轉拂迹長有偈無圭峯三頌勸修幻行若彼諸菩薩及末世眾生常應遠離幻諸幻悉皆離如木中生火木盡火還滅合法之文長有偈無圭峰四頌結頓修相覺即無漸次方便亦如是亦如是者不作方便也頌略結酬私註二漸次行證者天台止觀云漸初亦知實相實相難解漸次易行先修歸戒翻邪向正止火血刀達三善道次修禪定止欲散網達色無色定道乃至後修實相止二邊偏達常住道是為初淺後深漸次止觀相文今普眼請云演說菩薩修行漸次答中具明戒定觀慧結酬又云如是修行如是漸次既與止觀大同所謂解圓行次也私註於此分四初普眼章正明漸次行證二初請問三初進問威儀於是普眼菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正述請問二初正請大悲世尊願為此會諸菩薩眾及為末世一切眾生演說菩薩修行漸次云何思惟云何住持眾生未悟作何方便普令開悟前聞頓行不作方便恐漸次機謂知之即已都不假修故復請漸行修戒定慧開悟圓覺思惟者繫緣法界達陰本空住持者安心實相不起妄念稟戒習定助成觀慧故云方便圭峰謂思惟是思慧住持是修慧下佇聽為聞慧煥疏謂思惟請慧住持請定方便請戒式師謂思惟是觀住持是止方便即正修之前二十五法今謂下結酬中牒六如是諸疏分對未必全然況二十五法答中無文義說成曲讀者詳之私註思惟請示所修也住持請示所證也但思惟必藉方便住持必由開悟故復請之其修行漸次亦當攝歸所修請雖有六秪是修證慈室二述意世尊若彼眾生無正方便及正思惟聞佛如來說此三昧心生迷悶即於圓覺不能悟入願興慈悲為我等輩及末世眾生假說方便為迷悶者重扣所修故略開悟住持只言方便與思惟耳又假說方便者上請六事無非出於善巧故今結請只以方便兼之於無修證中強言修證故云假說慈室三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來修行漸次思惟住持乃至假說種種方便汝今諦聽當為汝說二受旨時普眼菩薩奉教歡喜及諸大眾默然而聽三正答二初長行三初標意善男子彼新學菩薩及末世眾生欲求如來淨圓覺心應當正念遠離諸幻夫淨圓覺心眾生本具諸佛究顯今返迷從悟故指如來私註應當正念遠離諸幻者圭峰云指前徵釋離幻用心為起行本若執定實觀行不成故須躡前為方便矣正念者無念也智論云有念是魔業無念是法印與下離幻反覆相成離幻故正念正念故離幻式師云正念即訶五欲棄五蓋行五法亦調攝五事若不然者非住正念咸師云二邊皆中故云正念遠離諸幻者指前標後也今謂秪是總標耳正念即標戒定慧諸幻即三學所離汙戒之瑕玷障定之事性迷理之惑也鄣南二廣釋二初戒定先依如來奢摩他行堅持禁戒安處徒眾宴坐靜室奢摩他翻止止定也下文云至靜為行如來行此已顯圓覺故令依之又標如來簡非邪小戒定兼學堪入觀門雖安處徒眾互相策勤必屏息攀緣宴居靜室宴默也安也夫欲修定慧必攝身心則宴坐之言成前止行成後觀慧故下即云恒作是念等若以天台二十五方便擬釋今文則似初具五緣但缺衣食一緣耳堅持禁戒持戒清淨也安處徒眾近善知識也宴坐靜室即閑居靜處及息諸緣務也文多止行者欲明漸次行證直云戒定方便助成觀慧三學相由即答漸次之問然佛祖垂軌廣略隨宜未應一準東陽慈室謂此文具二十五法強以義求今所不用私註入道之首故曰先依戒為能依奢摩他為所依圓教三學竝稱無作蓋依中理而行特言如來者性德三如來也徒眾者同行同見人也互相彫琢為長道緣圭峰引淨名云不必是坐為宴坐也今謂淨名以圓斥小故訶身子云不起滅定現諸威儀是真宴坐今文正令宴坐靜室豈得却以不坐而釋之然此中但標身儀不云定相以能顯所應入根本四禪如常坐三昧問經何不言答根本四禪佛之常談但舉身儀即知此定鄣南二觀慧諸疏皆以生法二空科釋今考不爾分二初託陰明觀二初約法推二初推窮陰境二初約四大觀身如幻恒作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處即知此身畢竟無體和合為相實同幻化恒作是念者意止觀中不得暫捨言四大者淨名記云四大為所造四微為能造以四微和合造成四大名四大造色問微義可知大義云何答地水火風徧處皆有故名大也大論云如佛說四大無處不有故名為大各離者從昔妄想執四大為身約俗諦和合而言今約真諦破之故云各離此中應用不自他等四句推之畢竟無體能執情盡也鄣南和合者堅濕煖動假和合也寶積經云此身生時與其父母四大種性一類歌羅邏身若唯地大無水界者譬如有人握乾灰終不和合若唯水界無地界者譬如油水無有堅實即便流散若唯地水無火界者譬如夏月陰處肉團無日光照即便爛壞若唯地水火無風界者則不增長精氣煖氣者氣是四大之本不唯是風故水火中亦云氣也動轉歸風者淨名曰是身無作風力所轉皆云歸者既合大為身今推身無主故云歸也各離者約觀名離非謂命終故知四大相違未審我身屬於何大若總相屬即是四我若總不屬離四無我見如實理知四大假合畢竟無體圭峰經文約四大推身蓋破實法略疏約四大亡我我屬假名然大乘圓觀身心既空我執亦盡但說有闕具不可不分私註二約根塵觀心寂滅二初根對心生四緣假合妄有六根六根四大中外合成妄有緣氣於中積聚似有緣相假名為心身本無身緣四大有故名四緣六根依身而具一往名中四大從外而攬一往名外中外圍空而心又在中間空處牢結故云於中積聚此緣即能緣心也不實如氣同上緣影皆顯體虗也無體則無相又豈有名今且以生滅見之故言似且以慮知召之故言假諸文只云名色者亦此意也慈室中外合成者圭峰云四大為中六想為外今謂意根亦在於內髮毛爪齒亦在於外豈得例分之耶妄有緣氣者圭峯云此虗妄心雖假緣生不離真心氣分故云緣氣今謂緣氣即能執妄情既云妄有何謂真心於中積聚者對法塵領納前境也鄣南竊詳中外之釋且準慈室緣氣者即第六識能造心王謂妄身既成根必對境即有緣慮之氣分此心於中起受想行善惡無記念念不息故云於中積聚此所起心相俱非實有故云似有緣相王所俱心但有名字故云假名為心私註二塵消心寂善男子此虗妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見若以從真起妄無明生法為言必先有不覺之心方有根塵世界今就日用覈之意顯因境有心無塵則無心也四大分解者不止謂四大各歸本性此文須以請觀音經地無堅性水性無住風性無礙火大不實釋之方顯無體慈室緣塵者四緣六塵也心託六塵塵依四大四大無體六塵即空故云散滅緣塵既滅心體即空故決判云畢竟無有言緣心者即前緣氣之心也圭峯畢竟無有者情盡垢除不復更起也鄣南於中者非對外言指法之辭耳煥疏謂緣塵者即能緣之心所緣之塵非經文意宜依略疏私註二結成觀相善男子彼之眾生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅彼之眾生指前修觀人也前破身心及六塵境故此結云幻身滅等滅謂寂滅即空觀也幻塵滅故幻滅亦滅者生死既空涅槃亦寂假觀也後二句中道常住所謂諸幻雖盡不入斷滅然此觀相三智一心無惑不破如大圓鏡明像宛然常不離故私註二約喻顯二初明幻滅觀成二初喻譬如磨鏡垢盡明現修觀如磨智體如明身心頓忘則種智圓矣私註夫鏡性本明非從外得塵覆則隱磨之則顯隱顯雖殊明性不異圭峯二合善男子當知身心皆為幻垢垢相永滅十方清淨既以身心合幻垢則人執法執性之與相皆屬幻垢十方乃十界也清淨乃本具覺性顯現合上非幻不滅也慈室二誡迷真執妄二初喻善男子譬如清淨摩尼寶珠映於五色隨方各現諸愚癡者見彼摩尼實有五色摩尼體性瑩淨絕瑕都無色相由性淨故一切色相對則現中青黃赤白黑五色各各隨方而現五色喻五道隨方喻隨業愚人不了珠體但見全是青黃故華嚴云凡夫見諸法但隨諸相轉不了法無性以是不見佛圭峯五色喻五道喻法對當一往雖便然九界眾生皆背性成迷俱是認色未識珠體東陽摩尼此翻離垢即如意珠也珠體本無五色因色而映珠體圓覺一性也五色身心五陰也竹菴二合二初正合迷真善男子圓覺淨性現於身心隨類各應彼愚癡者說淨圓覺實有如是身心自相亦復如是隨迷染之氣類應現而有也亦復如是乃合上喻慈室幻從覺生幻全是覺昧覺執幻非癡而何其猶結水為冰詎可見冰而忘水也私註由此不能遠於幻化是故我說身心幻垢對離幻垢說名菩薩垢盡對除即無對垢及說名者本以眾生妄執幻化故佛說云幻垢眾生依教離垢故復說名菩薩所離之垢既無對離之智何立者字貫通兩句謂對垢者菩薩也說名者佛也既無對治之智何有起智之人深淺之執本無何有說教之者故俱無也圭峯理絕假名依幻說覺覺圓幻盡則能所忘矣私註二觀成歷法二初總明證理善男子此菩薩及末世眾生證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發幻身為主外見東西我相既無更何方所然虗空離識亦非實有故首楞嚴云若有一人發真歸源十方虗空一時消殞謂迷情所覆覺處見空塵影既消空元是覺顯謂空消覺現發謂妄盡心開翻覆觀之俱無邊際圭峰頓了實法假名性相等執當體如幻故云證得達緣影之心見鏡像之身本無故名為滅無方即無方所橫徧也無邊即無邊際豎深也由清淨故如虗空如虗空故得清淨此乃覺體顯發正是開悟之相所發之體也慈室達諸法虗幻如影像不實全是覺性當處寂滅得顯此性清淨如空徧一切處亦無所在既曰證得必入圓位位通淺深觀行相似及分真也私註二歷示三諦三初真諦世出世間自他依正一一徧達葢三千果成咸稱常樂也分二初別顯真淨四初世間諸法四初根識覺圓明故顯心清淨心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨識清淨故聞塵清淨聞清淨故耳根清淨根清淨故耳識清淨識清淨故覺塵清淨如是乃至鼻舌身意亦復如是清淨即空之異名大論云畢竟空即畢竟清淨以人畏空故言清淨鄣南見塵者不單說外色名塵亦不說根識名塵根塵識三自有文故此見塵體還是我執